name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        shell: cmd
        run: npm install

      - name: Generate icon.ico
        shell: cmd
        run: node generate-icon.js

      - name: Build Windows EXE
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OIC-Task-Manager-Setup
          path: dist/*.exe
          if-no-files-found: warn
