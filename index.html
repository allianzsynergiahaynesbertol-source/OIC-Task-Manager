<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#160D76"/>
<title>OIC Task Manager</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cardo:wght@400;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Open Sans',system-ui,sans-serif;min-height:100vh;padding:1.25rem;font-size:14px;}
button,input,select{font-family:inherit;font-size:13px;outline:none;}
.card{border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px;border:0.5px solid var(--border);background:var(--card);}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;}
.hdr{font-family:'Cardo',Georgia,serif;font-weight:700;color:var(--navy);}
.inp{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);width:100%;}
.btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:500;border:none;font-family:inherit;font-size:13px;}
.btn-primary{background:#F08530;color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-skip{background:#4a1d96;color:#fff;}
.btn-ghost{background:transparent;border:0.5px solid var(--border)!important;color:var(--muted);}
.tab-btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;}
.tab-active{background:var(--navy);color:#fff;border:none;font-weight:600;}
.tab-inactive{background:transparent;border:0.5px solid var(--border);color:var(--muted);font-weight:400;}
.sec-title{font-family:'Cardo',Georgia,serif;font-weight:700;font-size:16px;}
.prog-wrap{flex:1;height:9px;border-radius:6px;overflow:hidden;border:0.5px solid var(--border);background:var(--surface);}
.prog-bar{height:100%;border-radius:6px;transition:width .4s;}
input[type=checkbox]{cursor:pointer;accent-color:var(--navy);}
.expand-content{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.action-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.cnt-badge{font-size:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:1px 8px;color:var(--muted);}
.setting-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:0.5px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.freq-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);display:inline-block;}
.freq-dot.done{background:var(--ok);border-color:var(--ok-bd);}
@keyframes fadeIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn .2s ease forwards;}
@keyframes fadeOut{from{opacity:1;max-height:200px;}to{opacity:0;max-height:0;overflow:hidden;}}
.fade-out{animation:fadeOut .3s ease forwards;}
[data-light]{--navy:#160D76;--tufts:#4094D9;--orange:#F08530;--bg:#FFFFFA;--surface:#f0f0ec;--card:#fff;--border:#d4d4d0;--muted:#666;--text:#222;--danger:#b91c1c;--danger-bg:#fee2e2;--danger-bd:#fca5a5;--warn:#92400e;--warn-bg:#fef3c7;--warn-bd:#fcd34d;--info:#1e40af;--info-bg:#dbeafe;--info-bd:#93c5fd;--ok:#14532d;--ok-bg:#dcfce7;--ok-bd:#86efac;--skip:#4a1d96;--skip-bg:#ede9fe;--skip-bd:#c4b5fd;}
[data-dark]{--navy:#4094D9;--tufts:#60aee8;--orange:#F08530;--bg:#181818;--surface:#242424;--card:#2a2a2a;--border:#3a3a3a;--muted:#aaa;--text:#e8e8e4;--danger:#fca5a5;--danger-bg:#450a0a;--danger-bd:#7f1d1d;--warn:#fcd34d;--warn-bg:#451a03;--warn-bd:#92400e;--info:#93c5fd;--info-bg:#1e3a5f;--info-bd:#1e40af;--ok:#86efac;--ok-bg:#052e16;--ok-bd:#14532d;--skip:#c4b5fd;--skip-bg:#2e1065;--skip-bd:#4a1d96;}
</style>
</head>
<body data-light>
<div id="app"></div>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});

var S={
  get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

/* ── Date helpers ────────────────────────────────────── */
function today(){return new Date().toISOString().split('T')[0];}
function addDays(s,n){var d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function dow(s){
  // Returns 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
  return new Date(s+'T12:00:00').getDay();
}
function fmt(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});}
function fmtS(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('en-PH',{month:'short',day:'numeric'});}
function diffDays(d){return Math.floor((new Date(today())-new Date(d))/86400000);}

// Week always starts Monday, ends Sunday
function weekMon(s){var d=dow(s);return addDays(s,d===0?-6:1-d);}

function getWeeks(){
  var t=today();
  var mon=weekMon(t);
  // Always show the Mon-Sun week containing today
  // If Sat/Sun, also show next week
  var weeks=[{mon:mon,sun:addDays(mon,6)}];
  var dw=dow(t);
  if(dw===6||dw===0){
    var mon2=addDays(mon,7);
    weeks.push({mon:mon2,sun:addDays(mon2,6)});
  }
  return weeks;
}

function last14(){var d=[];for(var i=13;i>=0;i--){var x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0]);}return d;}

var COV=[{v:'daily',l:'Every Day'},{v:'weekdays',l:'Mon – Fri'},{v:'weekends',l:'Sat – Sun'},{v:'weekly',l:'Weekly (fixed day)'},{v:'monthly',l:'Monthly (fixed date)'},{v:'3rdweek',l:'Every 3rd Week'},{v:'none',l:'One-time'}];
var PERIODS=[{v:'day',l:'per Day'},{v:'week',l:'per Week'},{v:'month',l:'per Month'}];
var PRIOS=['High','Medium','Low'];
var CATS=['Work','Personal','Health','Finance','Operations','Other'];
var DOW_L=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ── Period key ──────────────────────────────────────── */
// For day-based coverage (daily/weekdays/weekends), each calendar date
// is ALWAYS its own independent period — never share across days.
// Only weekly/monthly/3rdweek can share a period across dates.
function periodKey(task,d){
  var cov=task.coverage||'none';
  var period=task.freqPeriod||'day';
  // Day-based coverage: always per-day regardless of freqPeriod setting
  if(cov==='daily'||cov==='weekdays'||cov==='weekends') return d;
  // Fixed-schedule coverage: respect the period setting
  if(period==='week') return 'w-'+weekMon(d);
  if(period==='month') return 'm-'+d.slice(0,7);
  return d;
}
function tickCount(task,d){
  var key=periodKey(task,d);
  return((task.ticks||{})[key]||[]).length;
}
function isDone(task,d){
  if(!task.coverage||task.coverage==='none') return !!task.done;
  return tickCount(task,d)>=(task.freqTimes||1);
}
function coveredOn(task,d){
  var c=task.coverage||'none';
  if(c==='none') return false;
  var dw=dow(d);
  if(c==='daily') return true;
  if(c==='weekdays') return dw>=1&&dw<=5;
  if(c==='weekends') return dw===0||dw===6;
  if(c==='weekly'){return dw===(task.due?dow(task.due):1);}
  if(c==='monthly'){var td=task.due?new Date(task.due+'T00:00:00').getDate():1;return new Date(d+'T00:00:00').getDate()===td;}
  if(c==='3rdweek'){var dd=new Date(d+'T00:00:00').getDate();return dd>=15&&dd<=21;}
  return false;
}
function isSkipped(task,d){return (task.skips||[]).some(function(r){return d>=r.from&&d<=r.to;});}

function defSettings(){return{coverage:'weekdays',freqTimes:1,freqPeriod:'day',priority:'Medium',category:'Work',name:'',position:''};}
function blankTask(cfg){var c=cfg||{};return{title:'',priority:c.priority||'Medium',due:today(),dateReported:today(),category:c.category||'Work',coverage:c.coverage||'weekdays',freqTimes:c.freqTimes||1,freqPeriod:c.freqPeriod||'day',note:''};}

/* ── State ───────────────────────────────────────────── */
var CFG=S.get('oic_cfg')||defSettings();
var APP={
  dark:S.get('oic_dark')||false,
  tasks:S.get('oic_tasks9')||[],
  logs:S.get('oic_logs9')||[],
  trash:S.get('oic_trash9')||[],
  tab:'dashboard',
  form:blankTask(CFG),
  showForm:false,editId:null,
  expanded:{},weekExp:{},
  rmkId:null,rmkTxt:'',
  rsId:null,rsDue:'',
  skipId:null,skipFrom:'',skipTo:'',
  ecId:null,
  sel:[],
  reportRange:30,
  cfg:CFG
};

function set(patch,noRender){Object.assign(APP,patch);if(!noRender)render();}
function save(tasks,logs,trash){
  S.set('oic_tasks9',tasks);
  if(logs!==undefined) S.set('oic_logs9',logs);
  if(trash!==undefined) S.set('oic_trash9',trash);
  set({
    tasks:tasks,
    logs:logs!==undefined?logs:APP.logs,
    trash:trash!==undefined?trash:APP.trash
  });
}

/* ── Trash helpers ───────────────────────────────────── */
function moveToTrash(id){
  var t=APP.tasks.find(function(x){return x.id===id;});
  if(!t) return;
  var overdueDays=0;
  if(t.clearedOn&&t.due&&t.clearedOn>t.due){
    overdueDays=Math.floor((new Date(t.clearedOn+'T12:00:00')-new Date(t.due+'T12:00:00'))/86400000);
  }
  var trashItem=Object.assign({},t,{
    deletedOn:today(),
    wasOverdue:overdueDays>0,
    overdueDays:overdueDays
  });
  var newTrash=[trashItem].concat(APP.trash||[]);
  var newTasks=APP.tasks.filter(function(x){return x.id!==id;});
  // Mark logs as deleted but keep them
  var newLogs=APP.logs.map(function(l){
    return l.sid===id?Object.assign({},l,{deleted:true}):l;
  });
  save(newTasks,newLogs,newTrash);
}
function restoreFromTrash(id){
  var item=APP.trash.find(function(x){return x.id===id;});
  if(!item) return;
  var restored=Object.assign({},item);
  delete restored.deletedOn;delete restored.wasOverdue;delete restored.overdueDays;
  var newTasks=APP.tasks.concat([restored]);
  var newTrash=APP.trash.filter(function(x){return x.id!==id;});
  var newLogs=APP.logs.map(function(l){
    return l.sid===id?Object.assign({},l,{deleted:false}):l;
  });
  save(newTasks,newLogs,newTrash);
}
function permDeleteFromTrash(id){
  save(APP.tasks,APP.logs,APP.trash.filter(function(x){return x.id!==id;}));
}
function autoCleanTrash(){
  var days=APP.cfg.trashDays||0;
  if(!days) return;
  var cutoff=addDays(today(),-days);
  var newTrash=(APP.trash||[]).filter(function(x){return x.deletedOn&&x.deletedOn>cutoff;});
  if(newTrash.length!==APP.trash.length){
    S.set('oic_trash9',newTrash);
    APP.trash=newTrash;
  }
}

/* ── Classify ────────────────────────────────────────── */
function classify(){
  var td=today();
  var ov=[],tod=[],up=[],sk=[];
  APP.tasks.forEach(function(t){
    var rec=t.coverage&&t.coverage!=='none';
    if(rec){
      if((t.coverage==='weekly'||t.coverage==='monthly'||t.coverage==='3rdweek')&&t.due&&t.due<td){
        if(!isDone(t,t.due)&&!isSkipped(t,t.due)) ov.push(t);
      }
      return;
    }
    if(t.done) return;
    if(isSkipped(t,td)){sk.push(t);return;}
    if(t.due<td) ov.push(t);
    else if(t.due===td) tod.push(t);
    else up.push(t);
  });
  return{ov:ov,tod:tod,up:up,sk:sk};
}
function recurForDay(d){
  return APP.tasks.filter(function(t){
    if(!t.coverage||t.coverage==='none') return false;
    if(isSkipped(t,d)) return false;
    if(!coveredOn(t,d)) return false;
    if(isDone(t,d)) return false;
    return true;
  });
}
function recurDoneForDay(d){
  return APP.tasks.filter(function(t){
    if(!t.coverage||t.coverage==='none') return false;
    if(!coveredOn(t,d)) return false;
    return isDone(t,d);
  });
}

/* ── Tick ────────────────────────────────────────────── */
function tick(id,dateCtx){
  var td=today();
  var dc=dateCtx||td;
  var t=APP.tasks.find(function(x){return x.id===id;});
  if(!t) return;
  var rec=t.coverage&&t.coverage!=='none';

  function animate(fn){
    var el=document.querySelector('[data-tid="'+id+'"]');
    if(el){el.classList.add('fade-out');setTimeout(fn,300);}else fn();
  }

  if(rec){
    // Use the ACTUAL date context (not always today) so each day ticks independently
    var tickDate=dc;
    var key=periodKey(t,tickDate);
    var ticks=Object.assign({},t.ticks||{});
    var existing=ticks[key]||[];
    var max=t.freqTimes||1;

    if(existing.length>=max){
      // Untick: remove this period so task reappears for that day
      var newTicks=Object.assign({},ticks);
      delete newTicks[key];
      save(
        APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{ticks:newTicks,clearedOn:''}):x;}),
        APP.logs.filter(function(l){return!(l.sid===id&&l.pkey===key);})
      );
    }else{
      var newTicks2=Object.assign({},ticks);
      newTicks2[key]=existing.concat([tickDate]);
      var n=existing.length+1;
      var done=n>=max;
      var lg={id:Date.now(),sid:id,title:t.title,cat:t.category,on:td,pkey:key,note:'Tick '+n+'/'+max+(done?' — done':''),type:done?'completed':'partial'};
      var upd=APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{ticks:newTicks2,clearedOn:done?td:x.clearedOn}):x;});
      if(done) animate(function(){save(upd,[lg].concat(APP.logs));});
      else save(upd,[lg].concat(APP.logs));
    }
  }else{
    if(t.done){
      // Untick
      save(
        APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{done:false,clearedOn:''}):x;}),
        APP.logs.filter(function(l){return!(l.sid===id&&l.type==='completed');})
      );
    }else{
      var upd2=APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{done:true,clearedOn:td}):x;});
      var lg2={id:Date.now(),sid:id,title:t.title,cat:t.category,on:td,note:t.remark||'',type:'completed'};
      animate(function(){save(upd2,[lg2].concat(APP.logs));});
    }
  }
}

function delTask(id){moveToTrash(id);}

function submitForm(){
  var f=APP.form;if(!f.title.trim())return;
  var tasks=APP.editId
    ?APP.tasks.map(function(t){return t.id===APP.editId?Object.assign({},t,f):t;})
    :APP.tasks.concat([Object.assign({},f,{id:Date.now(),done:false,clearedOn:'',ticks:{},skips:[],remark:''})]);
  save(tasks);
  set({showForm:false,editId:null,form:blankTask(APP.cfg)});
}

function saveRmk(id){save(APP.tasks.map(function(t){return t.id===id?Object.assign({},t,{remark:APP.rmkTxt}):t;}));set({rmkId:null,rmkTxt:''});}
function saveRs(id){
  if(!APP.rsDue)return;
  var t=APP.tasks.find(function(x){return x.id===id;});
  save(APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{due:APP.rsDue,done:false}):x;}),[{id:Date.now(),sid:id,title:t.title,cat:t.category,on:today(),note:'Rescheduled → '+fmt(APP.rsDue),type:'rescheduled'}].concat(APP.logs));
  set({rsId:null,rsDue:''});
}
function saveSkip(id){
  var from=APP.skipFrom||today(),to=APP.skipTo||from;
  if(from>to){alert("'From' must be ≤ 'To'.");return;}
  var t=APP.tasks.find(function(x){return x.id===id;});
  var label=from===to?fmt(from):fmt(from)+' – '+fmt(to);
  save(APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{skips:(x.skips||[]).concat([{from:from,to:to,id:Date.now()}])}):x;}),[{id:Date.now(),sid:id,title:t.title,cat:t.category,on:today(),note:'Skipped: '+label,type:'skipped'}].concat(APP.logs));
  set({skipId:null,skipFrom:'',skipTo:''});
}
function removeSkip(tid,sid){save(APP.tasks.map(function(t){return t.id===tid?Object.assign({},t,{skips:(t.skips||[]).filter(function(s){return s.id!==sid;})}):t;}));}

/* ── DOM helpers ─────────────────────────────────────── */
function el(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k==='className') e.className=v;
    else if(k==='checked'||k==='disabled') e[k]=v;
    else if(k==='value') e.value=v;
    else if(k.indexOf('on')===0) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!==null&&v!==undefined&&v!==false) e.setAttribute(k,v===true?'':String(v));
  });
  if(kids)(Array.isArray(kids)?kids:[kids]).forEach(function(c){
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function d(a,c){return el('div',a,c);}
function sp(a,c){return el('span',a,c);}
function btn(cls,txt,fn,sty){var b=el('button',{className:'btn '+cls,style:sty||{}},txt);b.addEventListener('click',fn);return b;}
function inp(type,val,fn,attrs){
  var i=el('input',Object.assign({type:type,value:val||''},attrs||{}));
  if(type==='text'){
    i.addEventListener('input',function(e){fn(e.target.value,true);});
    i.addEventListener('change',function(e){fn(e.target.value,false);});
    i.addEventListener('blur',function(e){fn(e.target.value,false);});
  }else{
    i.addEventListener('change',function(e){fn(e.target.value,false);});
  }
  return i;
}
function mkSel(opts,val,fn,attrs){
  var s=el('select',Object.assign({className:'inp'},attrs||{}));
  opts.forEach(function(o){var op=el('option',{value:o[0]},o[1]);if(String(o[0])===String(val))op.selected=true;s.appendChild(op);});
  s.addEventListener('change',function(e){fn(e.target.value);});
  return s;
}

/* ── Badges ──────────────────────────────────────────── */
function badge(col,bg,bd,txt){return sp({className:'badge',style:{color:col,background:bg,border:'0.5px solid '+bd}},txt);}
function priBadge(p){
  if(p==='High') return badge('var(--danger)','var(--danger-bg)','var(--danger-bd)',p);
  if(p==='Medium') return badge('var(--warn)','var(--warn-bg)','var(--warn-bd)',p);
  return badge('var(--ok)','var(--ok-bg)','var(--ok-bd)',p);
}
function logBadge(type){
  if(type==='skipped') return badge('var(--skip)','var(--skip-bg)','var(--skip-bd)','⏭ Skipped');
  if(type==='rescheduled') return badge('var(--info)','var(--info-bg)','var(--info-bd)','📅 Rescheduled');
  if(type==='partial') return badge('var(--warn)','var(--warn-bg)','var(--warn-bd)','◑ Partial');
  return badge('var(--ok)','var(--ok-bg)','var(--ok-bd)','✓ Completed');
}
function covLabel(c){var o=COV.find(function(x){return x.v===c;});return o?o.l:c;}
function freqStr(t){
  var tl=t.freqTimes===1?'Once':t.freqTimes===2?'Twice':(t.freqTimes||1)+'×';
  var pl=(t.freqPeriod||'day')==='day'?'day':(t.freqPeriod==='week'?'wk':'mo');
  return covLabel(t.coverage)+' · '+tl+'/'+pl;
}

/* ── Task card ───────────────────────────────────────── */
function taskCard(t,opts){
  opts=opts||{};
  var td=today();
  var dc=opts.dateCtx||td;
  var rec=t.coverage&&t.coverage!=='none';
  var max=t.freqTimes||1;
  var ticks=rec?tickCount(t,dc):0;
  var full=rec?isDone(t,dc):t.done;
  var exp=APP.expanded[t.id];
  var askips=(t.skips||[]).filter(function(s){return s.to>=td;});

  var circ=el('button',{style:{marginTop:'3px',width:'22px',height:'22px',borderRadius:'50%',flexShrink:0,cursor:'pointer',
    border:'2px solid '+(full?'var(--ok)':ticks>0?'var(--orange)':'var(--tufts)'),
    background:full?'var(--ok)':ticks>0?'rgba(240,133,48,.15)':'transparent',
    display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:'700',
    color:full?'#fff':ticks>0?'var(--orange)':'var(--tufts)'}},
    rec&&max>1?(full?'✓':ticks>0?ticks+'/'+max:'+'):(full?'✓':'+'));
  (function(tid,dctx){circ.addEventListener('click',function(){tick(tid,dctx);});})(t.id,dc);

  var badges=[priBadge(t.priority),badge('var(--info)','var(--info-bg)','var(--info-bd)',t.category)];
  if(rec) badges.push(badge('var(--navy)','var(--surface)','var(--border)',freqStr(t)));
  if(opts.showDays&&diffDays(t.due)>0) badges.push(badge('var(--danger)','var(--danger-bg)','var(--danger-bd)',diffDays(t.due)+'d overdue'));
  if(full) badges.push(badge('var(--ok)','var(--ok-bg)','var(--ok-bd)','✓ Done'));
  else if(rec&&ticks>0) badges.push(badge('var(--warn)','var(--warn-bg)','var(--warn-bd)',ticks+' of '+max));
  if(askips.length) badges.push(badge('var(--skip)','var(--skip-bg)','var(--skip-bd)','⏭ '+askips.length+' skip'+(askips.length>1?'s':'')));

/* ── Week view ───────────────────────────────────────── */
function weekView(){
  var td=today();
  if(!APP.weekExp) APP.weekExp={};
  var weeks=getWeeks();
  var wrap=d({});

  weeks.forEach(function(week,wi){
    var mon=week.mon,sun=week.sun;
    var label=(wi===0?'This Week':'Next Week')+' ('+fmtS(mon)+' – '+fmtS(sun)+')';
    var wTot=0,wDone=0;
    var dayData=[];

    // Always Mon(i=0) → Sun(i=6)
    for(var i=0;i<7;i++){
      (function(i){
        var ds=addDays(mon,i); // mon+0=Mon, mon+6=Sun
        var dw=dow(ds);
        var isToday=ds===td;
        var isPast=ds<td;
        var oneTPend=APP.tasks.filter(function(t){return(!t.coverage||t.coverage==='none')&&!t.done&&t.due===ds;});
        var oneTDone=APP.tasks.filter(function(t){return(!t.coverage||t.coverage==='none')&&t.done&&(t.clearedOn===ds||t.due===ds);});
        var recPend=recurForDay(ds);
        var recDone=recurDoneForDay(ds);
        var allAct=oneTPend.concat(recPend);
        var allDone=oneTDone.concat(recDone);
        var tot=allAct.length+allDone.length;
        var dne=allDone.length;
        wTot+=tot; wDone+=dne;
        var pri={H:0,M:0,L:0},priD={H:0,M:0,L:0};
        allAct.concat(allDone).forEach(function(t){
          var k=t.priority==='High'?'H':t.priority==='Low'?'L':'M';
          pri[k]++;
          var done2=(!t.coverage||t.coverage==='none')?t.done:isDone(t,ds);
          if(done2) priD[k]++;
        });
        dayData.push({ds:ds,dw:dw,isToday:isToday,isPast:isPast,allAct:allAct,allDone:allDone,tot:tot,dne:dne,allDoneFlag:tot>0&&dne===tot,pri:pri,priD:priD});
      })(i);
    }

    var wAllDone=wTot>0&&wDone===wTot;
    var card=d({className:'card',style:{marginBottom:'1.25rem',borderLeft:'3px solid var(--tufts)'}});

    // header
    var hrow=d({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}});
    hrow.appendChild(d({className:'hdr',style:{fontSize:'15px'}},label));
    if(wTot>0) hrow.appendChild(sp({style:{fontSize:'13px',fontWeight:'700',color:wAllDone?'var(--ok)':'var(--orange)'}},wDone+'/'+wTot));
    card.appendChild(hrow);

    // ── Horizontal 7-column day grid ──
    var grid=d({style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'6px',marginBottom:'12px'}});
    dayData.forEach(function(dd){
      var isExp=!!(APP.weekExp[dd.ds]);
      var colEl=document.createElement('div');
      colEl.style.cssText='border-radius:8px;padding:6px 4px;text-align:center;border:0.5px solid '+(isExp?'var(--tufts)':dd.isToday?'var(--orange)':'var(--border)')+';background:'+(isExp?'var(--surface)':'transparent')+';'+(dd.tot>0?'cursor:pointer;':'');

      var dn=document.createElement('div');
      dn.style.cssText='font-weight:600;font-size:11px;color:'+(dd.isToday?'var(--orange)':'var(--muted)')+';margin-bottom:2px;';
      dn.textContent=DOW_L[dd.dw];
      colEl.appendChild(dn);

      var dnum=document.createElement('div');
      dnum.style.cssText="font-family:'Cardo',Georgia,serif;font-weight:700;font-size:18px;color:"+(dd.isToday?'var(--orange)':'var(--text)')+';margin-bottom:3px;';
      dnum.textContent=new Date(dd.ds+'T00:00:00').getDate();
      colEl.appendChild(dnum);

      var cntEl=document.createElement('div');
      cntEl.style.cssText='font-size:10px;font-weight:600;margin-bottom:3px;color:'+(dd.tot===0?'var(--muted)':dd.allDoneFlag?'var(--ok)':dd.isPast&&dd.dne<dd.tot?'var(--danger)':'var(--muted)')+';';
      cntEl.textContent=dd.tot===0?'—':dd.allDoneFlag?'✓ All done':dd.dne+'/'+dd.tot;
      colEl.appendChild(cntEl);

      var pr=document.createElement('div');
      pr.style.cssText='display:flex;gap:2px;justify-content:center;flex-wrap:wrap;';
      ['H','M','L'].forEach(function(k){
        var c=dd.pri[k],dn2=dd.priD[k];
        var p=document.createElement('span');
        p.style.cssText='font-size:9px;font-weight:600;opacity:'+(c===0?'0.25':'1')+';color:'+(c===0?'var(--muted)':dn2===c?'var(--ok)':'var(--orange)')+';';
        p.textContent=k+(c>0?' '+dn2+'/'+c:'');
        pr.appendChild(p);
      });
      colEl.appendChild(pr);

      if(dd.tot>0){
        (function(ds,cel){
          function toggle(){var we=Object.assign({},APP.weekExp||{});we[ds]=!we[ds];set({weekExp:we});}
          cel.addEventListener('click',toggle);
          cel.addEventListener('mouseenter',function(){if(!APP.weekExp[ds])cel.style.background='var(--surface)';});
          cel.addEventListener('mouseleave',function(){if(!APP.weekExp[ds])cel.style.background='transparent';});
        })(dd.ds,colEl);
      }
      grid.appendChild(colEl);
    });
    card.appendChild(grid);

    // ── Dropdowns below grid ──
    dayData.forEach(function(dd){
      if(!APP.weekExp[dd.ds]||dd.tot===0) return;
      var drop=d({style:{borderTop:'0.5px solid var(--border)',paddingTop:'8px',marginBottom:'4px'}});
      var dhRow=d({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}});
      var dhSpan=document.createElement('span');
      dhSpan.style.cssText="font-family:'Cardo',Georgia,serif;font-weight:700;font-size:14px;color:"+(dd.isToday?'var(--orange)':dd.isPast?'var(--danger)':'var(--navy)')+';';
      dhSpan.textContent=DOW_L[dd.dw]+', '+fmtS(dd.ds)+(dd.isToday?' · Today':dd.isPast?' · Past':'');
      dhRow.appendChild(dhSpan);
      if(dd.allDoneFlag) dhRow.appendChild(badge('var(--ok)','var(--ok-bg)','var(--ok-bd)','✓ All done'));
      drop.appendChild(dhRow);
      dd.allAct.forEach(function(t,i){drop.appendChild(taskCard(t,{num:i+1,dateCtx:dd.ds}));});
      dd.allDone.forEach(function(t,i){
        var c=taskCard(t,{num:dd.allAct.length+i+1,dateCtx:dd.ds});
        c.style.opacity='0.4';drop.appendChild(c);
      });
      card.appendChild(drop);
    });

    wrap.appendChild(card);
  });
  return wrap;
}

  var td=today();
  var body=document.body;
  body.setAttribute(APP.dark?'data-dark':'data-light','');
  body.removeAttribute(APP.dark?'data-light':'data-dark');
  body.style.background='var(--bg)';body.style.color='var(--text)';

  var cl=classify();
  var ot=APP.tasks.filter(function(t){return!t.coverage||t.coverage==='none';});
  var otD=ot.filter(function(t){return t.done;}).length,otT=ot.length,otP=otT?Math.round(otD/otT*100):0;
  var recTasks=APP.tasks.filter(function(t){return t.coverage&&t.coverage!=='none';});
  var recAct=recTasks.filter(function(t){return coveredOn(t,td)&&!isSkipped(t,td);});
  var recD=recAct.filter(function(t){return isDone(t,td);}).length;
  var recPart=recAct.filter(function(t){var c=tickCount(t,td);return c>0&&c<(t.freqTimes||1);}).length;
  var recP=recAct.length?Math.round(recD/recAct.length*100):0;

  function progBar(pct,color,a,b,extra,lbl){
    return d({},[
      d({style:{fontSize:'12px',color:'var(--muted)',marginBottom:'6px'}},lbl),
      d({style:{display:'flex',alignItems:'center',gap:'8px'}},[
        d({className:'prog-wrap'},[d({className:'prog-bar',style:{width:pct+'%',background:color}})]),
        sp({style:{fontFamily:"'Cardo',Georgia,serif",fontSize:'14px',fontWeight:'700',color:'var(--navy)',minWidth:'36px'}},pct+'%'),
      ]),
      d({style:{fontSize:'11px',color:'var(--muted)',marginTop:'4px'}},a+' of '+b+' done'+(extra?' · '+extra+' partial':'')),
    ]);
  }

  var header=d({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem',flexWrap:'wrap',gap:'8px'}},[
    d({},[d({className:'hdr',style:{fontSize:'24px'}},'OIC Task Manager'),d({style:{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}},new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'}))]),
    d({style:{display:'flex',gap:'8px',alignItems:'center'}},[
      btn('btn-ghost',APP.dark?'☀️ Light':'🌙 Dark',function(){S.set('oic_dark',!APP.dark);set({dark:!APP.dark});}),
      btn('btn-primary','+ New Task',function(){set({showForm:true,editId:null,tab:'tasks',form:blankTask(APP.cfg)});}),
    ]),
  ]);

  var tabs=d({style:{display:'flex',gap:'8px',marginBottom:'1.25rem',flexWrap:'wrap'}},
    [['dashboard','Dashboard'],['checklist','Daily Checklist'],['tasks','All Tasks'],['logs','Logs'],['report','📊 Report'],['trash','🗑 Trash'],['settings','⚙️ Settings']].map(function(pair){
      var b=el('button',{className:'tab-btn '+(APP.tab===pair[0]?'tab-active':'tab-inactive')},pair[1]);
      b.addEventListener('click',function(){set({tab:pair[0]});});
      return b;
    })
  );

  var content=d({});

  if(APP.tab==='dashboard'){
    var metrics=d({style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:'10px',marginBottom:'1.25rem'}},
      [['Total',APP.tasks.length,'var(--navy)'],['Done',otD,'var(--ok)'],['Overdue',cl.ov.length,'var(--danger)'],['Pending',recAct.length-recD,'var(--orange)'],['Recurring',recTasks.length,'var(--tufts)'],['Skipped',cl.sk.length,'var(--skip)']].map(function(x){
        return d({style:{background:'var(--surface)',borderRadius:'10px',padding:'12px 8px',textAlign:'center',border:'0.5px solid var(--border)'}},[d({className:'hdr',style:{fontSize:'22px',color:x[2]}},String(x[1])),d({style:{fontSize:'11px',color:'var(--muted)',marginTop:'2px'}},x[0])]);
      })
    );
    var prog=d({className:'card',style:{marginBottom:'1.25rem'}},[d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}},[progBar(otP,'#F08530',otD,otT,0,'One-time tasks'),progBar(recP,'var(--tufts)',recD,recAct.length,recPart,'Recurring — today')])]);
    var secs=[];
    if(cl.ov.length) secs.push(section('🔴 Overdue',cl.ov,{showDays:true,color:'var(--danger)'}));
    if(cl.tod.length) secs.push(section("🟡 Today's Tasks",cl.tod,{color:'var(--orange)'}));
    content=d({},[metrics,prog].concat(secs).concat([weekView(),barChart()]));
  }

  if(APP.tab==='checklist'){
    var rTod=recurForDay(td);
    var secs2=[
      section('🔴 Overdue',cl.ov,{showDays:true,color:'var(--danger)',empty:'None'}),
      section("🟡 Today's Tasks",cl.tod,{color:'var(--orange)',empty:'None'}),
      section('🔁 Recurring (Today)',rTod,{color:'var(--navy)',empty:'No recurring tasks today.',dateCtx:td}),
    ];
    if(cl.sk.length) secs2.push(d({style:{marginBottom:'1.5rem'}},[
      d({className:'hdr',style:{fontSize:'16px',color:'var(--skip)',marginBottom:'8px'}},'⏭ Skipped Today ('+cl.sk.length+')'),
      d({},cl.sk.map(function(t,i){return d({className:'card',style:{opacity:'0.6',display:'flex',gap:'8px',alignItems:'center'}},[sp({style:{fontSize:'12px',color:'var(--muted)'}},i+1+'.'),sp({style:{fontFamily:"'Cardo',Georgia,serif",fontSize:'14px',color:'var(--muted)'}},t.title),badge('var(--skip)','var(--skip-bg)','var(--skip-bd)','⏭ Skipped')]);})),
    ]));
    content=d({},secs2);
  }

  if(APP.tab==='tasks') content=tasksTab();

  if(APP.tab==='logs'){
    var lp=[d({className:'hdr',style:{fontSize:'18px',marginBottom:'12px'}},'Activity Logs')];
    if(!APP.logs.length) lp.push(d({style:{color:'var(--muted)',fontSize:'14px'}},'No logs yet.'));
    else{
      APP.logs.forEach(function(l,i){
        var isDeleted=l.deleted;
        var row=d({className:'card',style:{marginBottom:'8px',display:'flex',alignItems:'flex-start',gap:'12px',opacity:isDeleted?'0.5':'1'}});
        row.appendChild(sp({style:{fontSize:'12px',color:'var(--muted)',minWidth:'22px',marginTop:'2px'}},(i+1)+'.'));
        var info=d({style:{flex:1}});
        var titleRow=d({style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}});
        titleRow.appendChild(sp({style:{fontFamily:"'Cardo',Georgia,serif",fontWeight:'700',fontSize:'14px',color:'var(--text)',textDecoration:isDeleted?'line-through':'none'}},l.title||''));
        titleRow.appendChild(logBadge(l.type));
        if(isDeleted) titleRow.appendChild(badge('var(--danger)','var(--danger-bg)','var(--danger-bd)','🗑 Deleted'));
        info.appendChild(titleRow);
        info.appendChild(d({style:{fontSize:'12px',color:'var(--muted)'}},(l.cat||'')+' · '+fmt(l.on)));
        if(l.note) info.appendChild(d({style:{fontSize:'12px',color:'var(--tufts)',marginTop:'2px'}},l.note));
        row.appendChild(info);
        // Delete to trash button (only for non-deleted logs with a matching live task)
        if(!isDeleted){
          (function(sid){
            var db=btn('btn-ghost','🗑',function(){
              if(window.confirm('Move this task to Trash?')) moveToTrash(sid);
            },{fontSize:'11px',padding:'1px 6px',color:'var(--danger)'});
            row.appendChild(db);
          })(l.sid);
        }
        lp.push(row);
      });
      lp.push(btn('btn-ghost','Clear all logs',function(){S.set('oic_logs9',[]);set({logs:[]});},{marginTop:'8px',color:'var(--danger)'}));
    }
    content=d({},lp);
  }

  if(APP.tab==='trash'){
    autoCleanTrash();
    var trash=APP.trash||[];
    var tp=[d({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:'8px'}})];
    var trashHdr=d({className:'hdr',style:{fontSize:'18px'}},'🗑 Trash ('+trash.length+')');
    var emptyBtn=btn('btn-ghost','Empty Trash',function(){if(window.confirm('Permanently delete all '+trash.length+' items?')){S.set('oic_trash9',[]);set({trash:[]});}});
    emptyBtn.style.color='var(--danger)';
    tp[0].appendChild(trashHdr);
    if(trash.length>0) tp[0].appendChild(emptyBtn);

    if(!trash.length){
      tp.push(d({style:{color:'var(--muted)',fontSize:'14px',padding:'1rem 0'}},'Trash is empty.'));
    }else{
      trash.forEach(function(t){
        var overdueDays=t.overdueDays||0;
        var tc=d({className:'card',style:{marginBottom:'8px',opacity:'0.85'}});
        var topRow=d({style:{display:'flex',alignItems:'flex-start',gap:'10px',marginBottom:'8px'}});
        var inf=d({style:{flex:1}});
        // Title + badges
        var tr2=d({style:{display:'flex',flexWrap:'wrap',alignItems:'center',gap:'6px',marginBottom:'6px'}});
        tr2.appendChild(sp({style:{fontFamily:"'Cardo',Georgia,serif",fontWeight:'700',fontSize:'15px',color:'var(--text)'}},t.title));
        tr2.appendChild(priBadge(t.priority));
        tr2.appendChild(badge('var(--info)','var(--info-bg)','var(--info-bd)',t.category));
        if(overdueDays>0) tr2.appendChild(badge('var(--danger)','var(--danger-bg)','var(--danger-bd)','Overdue '+overdueDays+'d'));
        inf.appendChild(tr2);
        // Dates
        var dates=d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 12px',fontSize:'12px',color:'var(--muted)'}});
        if(t.dateReported) dates.appendChild(d({},'📋 Reported: '+fmt(t.dateReported)));
        if(t.due) dates.appendChild(d({},'📅 Deadline: '+fmt(t.due)));
        if(t.clearedOn) dates.appendChild(d({},'✓ Cleared: '+fmt(t.clearedOn)));
        dates.appendChild(d({},'🗑 Deleted: '+fmt(t.deletedOn)));
        if(t.note) dates.appendChild(d({},'Note: '+t.note));
        inf.appendChild(dates);
        topRow.appendChild(inf);
        // Actions
        var acts=d({style:{display:'flex',flexDirection:'column',gap:'6px',flexShrink:0}});
        (function(tid){
          var restoreBtn=btn('btn-ghost','↩ Restore',function(){restoreFromTrash(tid);},{fontSize:'12px',padding:'4px 10px',color:'var(--ok)',border:'0.5px solid var(--ok-bd)'});
          var permBtn=btn('btn-ghost','✕ Delete',function(){if(window.confirm('Permanently delete this task? This cannot be undone.'))permDeleteFromTrash(tid);},{fontSize:'12px',padding:'4px 10px',color:'var(--danger)',border:'0.5px solid var(--danger-bd)'});
          acts.appendChild(restoreBtn);acts.appendChild(permBtn);
        })(t.id);
        topRow.appendChild(acts);
        tc.appendChild(topRow);
        tp.push(tc);
      });
    }
    content=d({},tp);
  }

  if(APP.tab==='report') content=reportTab();
  if(APP.tab==='settings') content=settingsTab();

  var app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(d({},[header,tabs,content]));
}

render();
</script>
</body>
</html>
