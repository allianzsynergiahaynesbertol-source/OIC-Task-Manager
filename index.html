<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#160D76"/>
<title>OIC Task Manager</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cardo:wght@400;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Open Sans',system-ui,-apple-system,sans-serif;min-height:100vh;padding:1.25rem;font-size:14px;}
.hdr,.metric-num,.section-title{font-family:'Cardo',Georgia,serif;}
/* Google Fonts loaded separately in the real app via <link> in <head> */
@keyframes fadeSlideOut{0%{opacity:1;transform:translateX(0);max-height:200px;}100%{opacity:0;transform:translateX(40px);max-height:0;margin:0;padding:0;}}
@keyframes fadeSlideIn{0%{opacity:0;transform:translateX(-20px);}100%{opacity:1;transform:translateX(0);}}
.task-enter{animation:fadeSlideIn .25s ease forwards;}
.task-exit{animation:fadeSlideOut .35s ease forwards;overflow:hidden;pointer-events:none;}
button,input,select{font-family:'Open Sans',sans-serif;font-size:13px;outline:none;}
.card{border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px;border:0.5px solid var(--border);background:var(--card);}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.metric{border-radius:10px;padding:12px 8px;text-align:center;border:0.5px solid var(--border);background:var(--surface);}
.metric-num{font-family:'Cardo',serif;font-size:22px;font-weight:700;}
.metric-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.hdr{font-family:'Cardo',serif;font-weight:700;color:var(--navy);}
.inp{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);width:100%;}
.btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:500;border:none;}
.btn-primary{background:#F08530;color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-skip{background:#4a1d96;color:#fff;}
.btn-ghost{background:transparent;border:0.5px solid var(--border)!important;color:var(--muted);}
.tab-btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Open Sans',sans-serif;}
.tab-active{background:var(--navy);color:#fff;border:none;font-weight:600;}
.tab-inactive{background:transparent;border:0.5px solid var(--border);color:var(--muted);font-weight:400;}
.section-title{font-family:'Cardo',serif;font-weight:700;font-size:16px;}
.prog-bar-wrap{flex:1;height:9px;border-radius:6px;overflow:hidden;border:0.5px solid var(--border);background:var(--surface);}
.prog-bar{height:100%;border-radius:6px;transition:width .4s;}
input[type=checkbox]{cursor:pointer;accent-color:var(--navy);}
.expand-content{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.action-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.count-badge{font-size:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:1px 8px;color:var(--muted);}
.week-day{border-radius:8px;padding:6px 4px;text-align:center;border:0.5px solid var(--border);}
.week-day.today{border-color:var(--orange);}
.week-day.clickable,.week-day.clickable *{cursor:pointer!important;}
.week-day.clickable:hover{background:var(--surface);border-color:var(--tufts);}
.week-day.expanded{border-color:var(--tufts);background:var(--surface);}
.week-day.clickable,.week-day.clickable *{user-select:none;}
.freq-dots{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
.freq-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);}
.freq-dot.done{background:var(--ok);border-color:var(--ok-bd);}
.freq-dot.active{background:var(--tufts);border-color:var(--info-bd);}
.setting-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:0.5px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
[data-light]{--navy:#160D76;--tufts:#4094D9;--orange:#F08530;--bg:#FFFFFA;--surface:#f0f0ec;--card:#ffffff;--border:#d4d4d0;--muted:#666;--text:#222;--danger:#b91c1c;--danger-bg:#fee2e2;--danger-bd:#fca5a5;--warn:#92400e;--warn-bg:#fef3c7;--warn-bd:#fcd34d;--info:#1e40af;--info-bg:#dbeafe;--info-bd:#93c5fd;--ok:#14532d;--ok-bg:#dcfce7;--ok-bd:#86efac;--skip:#4a1d96;--skip-bg:#ede9fe;--skip-bd:#c4b5fd;}
[data-dark]{--navy:#4094D9;--tufts:#60aee8;--orange:#F08530;--bg:#181818;--surface:#242424;--card:#2a2a2a;--border:#3a3a3a;--muted:#aaa;--text:#e8e8e4;--danger:#fca5a5;--danger-bg:#450a0a;--danger-bd:#7f1d1d;--warn:#fcd34d;--warn-bg:#451a03;--warn-bd:#92400e;--info:#93c5fd;--info-bg:#1e3a5f;--info-bd:#1e40af;--ok:#86efac;--ok-bg:#052e16;--ok-bd:#14532d;--skip:#c4b5fd;--skip-bg:#2e1065;--skip-bd:#4a1d96;}
</style>
</head>
<body data-light>
<div id="app"></div>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});

var store={
  get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

function todayStr(){return new Date().toISOString().split('T')[0];}
function addDays(s,n){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function getDow(s){return new Date(s+'T00:00:00').getDay();}
function fmtDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});}
function fmtShort(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-PH',{month:'short',day:'numeric'});}
function daysDiff(d){return Math.floor((new Date(todayStr())-new Date(d))/86400000);}
function getWeekMon(s){var dow=getDow(s);return addDays(s,dow===0?-6:1-dow);}
function getWeekBounds(s){var mon=getWeekMon(s);return{mon:mon,sun:addDays(mon,6)};}
function getDisplayWeeks(){
  var today=todayStr();
  var w1=getWeekBounds(today);
  var weeks=[w1];
  if(getDow(today)===0) weeks.push(getWeekBounds(addDays(today,1)));
  return weeks;
}
function getLast(n){var d=[];for(var i=n-1;i>=0;i--){var x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0]);}return d;}
function shortDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-PH',{month:'short',day:'numeric'});}

var COVERAGE_OPTIONS=[
  {v:'daily',l:'Every Day'},{v:'weekdays',l:'Mon – Fri'},{v:'weekends',l:'Sat – Sun'},
  {v:'weekly',l:'Weekly (fixed day)'},{v:'monthly',l:'Monthly (fixed date)'},
  {v:'3rdweek',l:'Every 3rd Week'},{v:'none',l:'One-time (no recurrence)'}
];
var PERIOD_OPTIONS=[{v:'day',l:'per Day'},{v:'week',l:'per Week'},{v:'month',l:'per Month'}];
var PRIOS=['High','Medium','Low'];
var CATS=['Work','Personal','Health','Finance','Operations','Other'];
var TABS=[['dashboard','Dashboard'],['checklist','Daily Checklist'],['tasks','All Tasks'],['logs','Logs'],['report','📊 Report'],['settings','⚙️ Settings']];

function getPeriodKey(period,dateS){
  if(period==='day') return dateS;
  if(period==='week') return 'w-'+getWeekMon(dateS);
  if(period==='month') return 'm-'+dateS.slice(0,7);
  return dateS;
}
// Returns the "effective date" to use for period key lookups for a recurring task
function getEffectiveDate(task, contextDate){
  var today=todayStr();
  var d=contextDate||today;
  // For week/month periods, the period key is the same regardless of which day in the period
  // So ticking on 'today' for a task due last week still clears it
  return d;
}

function getTickCount(task,dateS){
  var key=getPeriodKey(task.freqPeriod||'day',dateS);
  // also check if ticked on today for same period
  var keyToday=getPeriodKey(task.freqPeriod||'day',todayStr());
  var ticks=(task.periodTicks||{});
  // use whichever key has ticks — prefer today's period key
  var count=(ticks[keyToday]||[]).length;
  if(count===0&&key!==keyToday) count=(ticks[key]||[]).length;
  return count;
}
function isFullyDone(task,dateS){
  return getTickCount(task,dateS)>=(task.freqTimes||1);
}
function isCoveredOn(task,dateS){
  var cov=task.coverage||'none';
  if(cov==='none') return false;
  var dow=getDow(dateS);
  if(cov==='daily') return true;
  if(cov==='weekdays') return dow>=1&&dow<=5;
  if(cov==='weekends') return dow===0||dow===6;
  if(cov==='weekly'){var td=task.due?getDow(task.due):1;return dow===td;}
  if(cov==='monthly'){var td2=task.due?new Date(task.due+'T00:00:00').getDate():1;return new Date(dateS+'T00:00:00').getDate()===td2;}
  if(cov==='3rdweek'){var d=new Date(dateS+'T00:00:00').getDate();return d>=15&&d<=21;}
  return false;
}
function isSkipped(task,date){
  if(!task.skipRanges||!task.skipRanges.length) return false;
  return task.skipRanges.some(function(r){return date>=r.from&&date<=r.to;});
}

function defaultSettings(){
  return{defaultCoverage:'weekdays',defaultFreqTimes:1,defaultFreqPeriod:'day',defaultPriority:'Medium',defaultCategory:'Work',oicName:'',oicPosition:''};
}
function blankTask(settings){
  var s=settings||{};
  return{title:'',priority:s.defaultPriority||'Medium',due:todayStr(),category:s.defaultCategory||'Work',coverage:s.defaultCoverage||'weekdays',freqTimes:s.defaultFreqTimes||1,freqPeriod:s.defaultFreqPeriod||'day',note:''};
}

var savedSettings=store.get('oic_settings')||defaultSettings();
var state={
  dark:store.get('oic_dark')||false,
  tasks:store.get('oic_tasks8')||[],
  logs:store.get('oic_logs8')||[],
  tab:'dashboard',showForm:false,editId:null,
  form:blankTask(savedSettings),
  expanded:{},remarkId:null,remarkText:'',
  rescheduleId:null,rescheduleDate:'',
  skipPanel:null,skipFrom:'',skipTo:'',
  selected:new Set(),
  reportRange:30,
  weekExpanded:{},
  editClosedId:null,
  settings:savedSettings
};

function setState(p,skipRender){Object.assign(state,p);if(!skipRender)render();}
function saveTasks(tasks,logs){
  store.set('oic_tasks8',tasks);
  if(logs!==undefined) store.set('oic_logs8',logs);
  setState({tasks:tasks,logs:logs!==undefined?logs:state.logs});
}

function classify(){
  var today=todayStr();
  var overdue=[],todayT=[],upcoming=[],skipped=[];
  state.tasks.forEach(function(t){
    var isRecur=t.coverage&&t.coverage!=='none';
    if(isRecur){
      if((t.coverage==='weekly'||t.coverage==='monthly'||t.coverage==='3rdweek')&&t.due&&t.due<today){
        // overdue only if NOT fully done for that period
        if(!isFullyDone(t,t.due)&&!isSkipped(t,t.due)) overdue.push(t);
      }
      return;
    }
    if(t.done) return;
    if(isSkipped(t,today)){skipped.push(t);return;}
    if(t.due<today) overdue.push(t);
    else if(t.due===today) todayT.push(t);
    else upcoming.push(t);
  });
  return{overdue:overdue,todayT:todayT,upcoming:upcoming,skipped:skipped};
}

function getRecurringForDate(dateS){
  return state.tasks.filter(function(t){
    if(!t.coverage||t.coverage==='none') return false;
    if(isSkipped(t,dateS)) return false;
    if(!isCoveredOn(t,dateS)) return false;
    // hide if fully done for this period
    if(isFullyDone(t,dateS)) return false;
    return true;
  });
}

function getRecurringDoneForDate(dateS){
  return state.tasks.filter(function(t){
    if(!t.coverage||t.coverage==='none') return false;
    if(!isCoveredOn(t,dateS)) return false;
    return isFullyDone(t,dateS);
  });
}

function tickTask(id,dateS){
  var today=todayStr();
  var d=dateS||today;
  var t=state.tasks.find(function(x){return x.id===id;});
  if(!t) return;
  var isRecur=t.coverage&&t.coverage!=='none';

  function animateAndUpdate(updateFn){
    var cardEl=document.querySelector('[data-task-id="'+id+'"]');
    if(cardEl){cardEl.classList.add('task-exit');setTimeout(function(){updateFn();},340);}
    else updateFn();
  }

  if(isRecur){
    var tickDate=today;
    var key=getPeriodKey(t.freqPeriod||'day',tickDate);
    var allTicks=Object.assign({},(t.periodTicks||{}));
    var existing=allTicks[key]||[];
    var maxTimes=t.freqTimes||1;
    var newLogs,newTicks;

    // find any period key that has ticks (in case ticked on a different day)
    var activeKey=key;
    if(existing.length===0){
      var keys=Object.keys(allTicks);
      for(var ki=0;ki<keys.length;ki++){
        if((allTicks[keys[ki]]||[]).length>0){activeKey=keys[ki];existing=allTicks[keys[ki]];break;}
      }
    }

    if(existing.length>=maxTimes){
      // fully done — untick: remove the period entirely so it reappears
      newTicks=Object.assign({},allTicks);
      delete newTicks[activeKey];
      newLogs=state.logs.filter(function(l){return!(l.sourceId===id&&l.periodKey===activeKey);});
      saveTasks(state.tasks.map(function(x){
        return x.id===id?Object.assign({},x,{periodTicks:newTicks,clearedOn:''}):x;
      }),newLogs);
    }else{
      var tickNum=existing.length+1;
      newTicks=Object.assign({},allTicks);
      newTicks[key]=existing.concat([tickDate]);
      var isComplete=tickNum>=maxTimes;
      newLogs=[{id:Date.now(),sourceId:id,title:t.title,category:t.category,clearedOn:today,periodKey:key,remark:'Tick '+tickNum+'/'+maxTimes+(isComplete?' — Completed':''),type:isComplete?'completed':'partial'}].concat(state.logs);
      var updatedTasks=state.tasks.map(function(x){return x.id===id?Object.assign({},x,{periodTicks:newTicks,clearedOn:isComplete?today:x.clearedOn}):x;});
      if(isComplete){
        animateAndUpdate(function(){saveTasks(updatedTasks,newLogs);});
      }else{
        saveTasks(updatedTasks,newLogs);
      }
    }
  }else{
    if(t.done){
      // untick — set done:false so it reappears in dashboard
      var cleanLogs=state.logs.filter(function(l){return!(l.sourceId===id&&l.type==='completed');});
      saveTasks(state.tasks.map(function(x){
        return x.id===id?Object.assign({},x,{done:false,clearedOn:''}):x;
      }),cleanLogs);
    }else{
      var updatedTasks2=state.tasks.map(function(x){return x.id===id?Object.assign({},x,{done:true,clearedOn:today}):x;});
      var newLogs2=[{id:Date.now(),sourceId:id,title:t.title,category:t.category,clearedOn:today,due:t.due||'',remark:t.remark||'',type:'completed'}].concat(state.logs);
      animateAndUpdate(function(){saveTasks(updatedTasks2,newLogs2);});
    }
  }
}

function deleteTask(id){saveTasks(state.tasks.filter(function(t){return t.id!==id;}));}
function submitForm(){
  var f=state.form;if(!f.title.trim()) return;
  var tasks=state.editId
    ?state.tasks.map(function(t){return t.id===state.editId?Object.assign({},t,f):t;})
    :state.tasks.concat([Object.assign({},f,{id:Date.now(),done:false,remark:'',clearedOn:'',periodTicks:{},skipRanges:[]})]);
  saveTasks(tasks);
  setState({showForm:false,editId:null,form:blankTask(state.settings)});
}
function saveRemark(id){saveTasks(state.tasks.map(function(t){return t.id===id?Object.assign({},t,{remark:state.remarkText}):t;}));setState({remarkId:null,remarkText:''});}
function saveReschedule(id){
  if(!state.rescheduleDate) return;
  var t=state.tasks.find(function(x){return x.id===id;});
  saveTasks(state.tasks.map(function(x){return x.id===id?Object.assign({},x,{due:state.rescheduleDate,done:false}):x;}),[{id:Date.now(),sourceId:id,title:t.title,category:t.category,clearedOn:todayStr(),remark:'Rescheduled → '+fmtDate(state.rescheduleDate),type:'rescheduled'}].concat(state.logs));
  setState({rescheduleId:null,rescheduleDate:''});
}
function saveSkip(id){
  var today=todayStr(),from=state.skipFrom||today,to=state.skipTo||from;
  if(from>to){alert("'From' must be before 'To'.");return;}
  var t=state.tasks.find(function(x){return x.id===id;});
  var label=from===to?fmtDate(from):fmtDate(from)+' – '+fmtDate(to);
  saveTasks(state.tasks.map(function(x){return x.id===id?Object.assign({},x,{skipRanges:(x.skipRanges||[]).concat([{from:from,to:to,id:Date.now()}])}):x;}),[{id:Date.now(),sourceId:id,title:t.title,category:t.category,clearedOn:today,remark:'Skipped: '+label,type:'skipped'}].concat(state.logs));
  setState({skipPanel:null,skipFrom:'',skipTo:''});
}
function removeSkip(taskId,skipId){saveTasks(state.tasks.map(function(t){return t.id===taskId?Object.assign({},t,{skipRanges:(t.skipRanges||[]).filter(function(s){return s.id!==skipId;})}):t;}));}

// ── DOM helpers ──────────────────────────────────────────
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.indexOf('on')===0) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className') e.className=v;
    else if(k==='checked'||k==='disabled') e[k]=v;
    else if(k==='value') e.value=v;
    else if(v!==null&&v!==undefined&&v!==false) e.setAttribute(k,v===true?'':v);
  });
  if(children){
    var arr=Array.isArray(children)?children:[children];
    arr.forEach(function(c){
      if(c===null||c===undefined||c===false) return;
      e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
    });
  }
  return e;
}
function div(a,c){return el('div',a,c);}
function span(a,c){return el('span',a,c);}
function mkBtn(cls,txt,onClick,style){var b=el('button',{className:'btn '+cls,style:style||{}},txt);b.addEventListener('click',onClick);return b;}
function mkInp(type,val,onChange,attrs){
  var i=el('input',Object.assign({type:type,value:val||''},attrs||{}));
  if(type==='text'){
    i.addEventListener('input',function(e){onChange(e.target.value,true);});
    i.addEventListener('change',function(e){onChange(e.target.value,false);});
  }else{
    i.addEventListener('change',function(e){onChange(e.target.value);});
  }
  return i;
}
function mkSel(options,val,onChange,attrs){
  var s=el('select',Object.assign({className:'inp'},attrs||{}));
  options.forEach(function(opt){
    var o=el('option',{value:opt[0]},opt[1]||opt[0]);
    if(opt[0]===val) o.selected=true;
    s.appendChild(o);
  });
  s.addEventListener('change',function(e){onChange(e.target.value);});
  return s;
}

function makeBadge(color,bg,bd,text){return span({className:'badge',style:{color:color,background:bg,border:'0.5px solid '+bd}},text);}
function priBadge(p){
  if(p==='High') return makeBadge('var(--danger)','var(--danger-bg)','var(--danger-bd)',p);
  if(p==='Medium') return makeBadge('var(--warn)','var(--warn-bg)','var(--warn-bd)',p);
  return makeBadge('var(--ok)','var(--ok-bg)','var(--ok-bd)',p);
}
function logBadge(type){
  if(type==='skipped') return makeBadge('var(--skip)','var(--skip-bg)','var(--skip-bd)','⏭ Skipped');
  if(type==='rescheduled') return makeBadge('var(--info)','var(--info-bg)','var(--info-bd)','📅 Rescheduled');
  if(type==='partial') return makeBadge('var(--warn)','var(--warn-bg)','var(--warn-bd)','◑ Partial');
  return makeBadge('var(--ok)','var(--ok-bg)','var(--ok-bd)','✓ Completed');
}
function covLabel(c){var o=COVERAGE_OPTIONS.find(function(x){return x.v===c;});return o?o.l:c;}
function freqSummary(t){
  var times=t.freqTimes||1,period=t.freqPeriod||'day';
  var tl=times===1?'Once':times===2?'Twice':times+'×';
  return covLabel(t.coverage)+' · '+tl+'/'+(period==='day'?'day':period==='week'?'wk':'mo');
}

function makeFreqDots(task,dateS){
  var max=task.freqTimes||1;
  var done=getTickCount(task,dateS);
  if(max<=1) return null;
  var wrap=div({className:'freq-dots'});
  for(var i=0;i<max;i++){
    var dot=el('span',{className:'freq-dot'+(i<done?' done':'')+(i===done?' active':'')});
    wrap.appendChild(dot);
  }
  return wrap;
}

function makeTaskCard(t,opts){
  opts=opts||{};
  var today=todayStr();
  var d=opts.dateContext||today;
  var isRecur=t.coverage&&t.coverage!=='none';
  var days=opts.showDays?daysDiff(t.due):0;
  var maxTimes=t.freqTimes||1;
  var ticksDone=isRecur?getTickCount(t,d):0;
  var isFull=isRecur?isFullyDone(t,d):t.done;
  var expanded=state.expanded[t.id];
  var activeSkips=(t.skipRanges||[]).filter(function(s){return s.to>=today;});

  var circleLabel=isRecur&&maxTimes>1?(isFull?'✓':ticksDone>0?ticksDone+'/'+maxTimes:'+'):(isFull?'✓':'+');
  var circle=el('button',{style:{marginTop:'3px',width:'22px',height:'22px',borderRadius:'50%',flexShrink:'0',cursor:'pointer',border:'2px solid '+(isFull?'var(--ok)':ticksDone>0?'var(--orange)':'var(--tufts)'),background:isFull?'var(--ok)':ticksDone>0?'rgba(240,133,48,.15)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:'700',color:isFull?'#fff':ticksDone>0?'var(--orange)':'var(--tufts)'}},circleLabel);

function makeWeekView(){
  var today=todayStr();
  var weeks=getDisplayWeeks();
  var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return div({},weeks.map(function(week,wi){
    var mon=week.mon,sun=week.sun;
    var label=(wi===0?'This Week':'Next Week')+' ('+fmtShort(mon)+' – '+fmtShort(sun)+')';
    var dayCols=[],dayBreakdowns=[];
    var weekTotalTasks=0,weekDoneTasks=0;
    for(var i=0;i<7;i++){
      var dayS=addDays(mon,i);
      var dow=getDow(dayS);
      var isToday=dayS===today;
      var isPast=dayS<today;
      var oneTime=state.tasks.filter(function(t){
        if(!t.coverage||t.coverage==='none') return !t.done&&t.due===dayS;
        return false;
      });
      var recurring=getRecurringForDate(dayS);
      var recurDone=getRecurringDoneForDate(dayS);
      var oneTimeDone=state.tasks.filter(function(t){
        return(!t.coverage||t.coverage==='none')&&t.done&&t.clearedOn===dayS;
      });
      var allActive=oneTime.concat(recurring);
      var totalForDay=allActive.length+recurDone.length+oneTimeDone.length;
      var doneForDay=recurDone.length+oneTimeDone.length;
      weekTotalTasks+=totalForDay;
      weekDoneTasks+=doneForDay;

      // priority breakdown for this day
      var allDayTasks=allActive.concat(recurDone).concat(oneTimeDone);
      var priCount={H:0,M:0,L:0};
      var priDone={H:0,M:0,L:0};
      allDayTasks.forEach(function(t){
        var k=t.priority==='High'?'H':t.priority==='Low'?'L':'M';
        priCount[k]++;
        var done2=t.coverage&&t.coverage!=='none'?isFullyDone(t,dayS):t.done;
        if(done2) priDone[k]++;
      });
      var allDone=totalForDay>0&&doneForDay===totalForDay;

      function priPill(key,count,done2){
        var col=count===0?'var(--muted)':done2===count?'var(--ok)':'var(--orange)';
        var op=count===0?'0.25':'1';
        return span({style:{fontSize:'9px',fontWeight:'600',color:col,opacity:op,lineHeight:'1.2'}},key+(count>0?'('+done2+'/'+count+')':''));
      }

      dayCols.push(div({className:'week-day'+(isToday?' today':'')},[
        div({style:{fontWeight:'600',fontSize:'11px',color:isToday?'var(--orange)':'var(--muted)',marginBottom:'2px'}},DOW[dow]),
        div({style:{fontFamily:"'Cardo',serif",fontWeight:'700',fontSize:'18px',color:isToday?'var(--orange)':'var(--text)',marginBottom:'3px'}},new Date(dayS+'T00:00:00').getDate()+''),
        totalForDay>0
          ? div({style:{fontSize:'10px',color:allDone?'var(--ok)':isPast&&doneForDay<totalForDay?'var(--danger)':'var(--muted)',fontWeight:'600',marginBottom:'3px'}},
              allDone?'✓ All done':doneForDay+'/'+totalForDay)
          : div({style:{fontSize:'10px',color:'var(--muted)',marginBottom:'3px'}},'—'),
        div({style:{display:'flex',gap:'3px',justifyContent:'center',flexWrap:'wrap'}},[
          priPill('H',priCount.H,priDone.H),
          priPill('M',priCount.M,priDone.M),
          priPill('L',priCount.L,priDone.L),
        ]),
      ]));

      if(!allActive.length&&!recurDone.length&&!oneTimeDone.length) continue;
      if(allDone) continue;
      var dayLabel=div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px',marginTop:'4px'}},[
        span({style:{fontFamily:"'Cardo',serif",fontWeight:'700',fontSize:'14px',color:isToday?'var(--orange)':isPast?'var(--danger)':'var(--navy)'}},DOW[dow]+', '+fmtShort(dayS)+(isToday?' · Today':isPast?' · Past':'')),
      ].filter(Boolean));
      var taskItems=allActive.map(function(t,idx2){return makeTaskCard(t,{num:idx2+1,dateContext:dayS});});
      dayBreakdowns.push(div({style:{marginBottom:'12px'}},[dayLabel].concat(taskItems)));
    }

    var weekAllDone=weekTotalTasks>0&&weekDoneTasks===weekTotalTasks;
    var weekCountColor=weekAllDone?'var(--ok)':'var(--orange)';
    var weekCountText=weekTotalTasks>0?'('+weekDoneTasks+'/'+weekTotalTasks+')':'';

    return div({className:'card',style:{marginBottom:'1.25rem',borderLeft:'3px solid var(--tufts)'}},[
      div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}},[
        div({style:{fontFamily:"'Cardo',serif",fontWeight:'700',fontSize:'15px',color:'var(--navy)'}},label),
        weekCountText?span({style:{fontSize:'13px',fontWeight:'700',color:weekCountColor}},weekCountText):null,
      ].filter(Boolean)),
      div({style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'6px',marginBottom:'16px'}},dayCols),
    ].concat(dayBreakdowns));
  }));
}

  if(pathD){
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',pathD);path.setAttribute('fill','none');path.setAttribute('stroke','#1D9E75');path.setAttribute('stroke-width',2);path.setAttribute('stroke-linejoin','round');tsvg.appendChild(path);
    rates.forEach(function(r,idx2){if(r===null)return;var c2=document.createElementNS('http://www.w3.org/2000/svg','circle');c2.setAttribute('cx',Math.round(idx2*stepX));c2.setAttribute('cy',Math.round(80-(r/100)*70));c2.setAttribute('r',2.5);c2.setAttribute('fill','#1D9E75');tsvg.appendChild(c2);});
  }
  trendCard.appendChild(div({style:{overflowX:'auto'}},tsvg));

  // Category
  var catCard=div({className:'card',style:{marginBottom:'1.25rem'}});
  catCard.appendChild(div({className:'hdr',style:{fontSize:'15px',marginBottom:'12px'}},'Completions by category'));
  if(!catEntries.length){catCard.appendChild(div({style:{fontSize:'13px',color:'var(--muted)',padding:'8px 0'}},'No completions yet.'));}
  else{catEntries.forEach(function(entry){
    var pct=completed.length?Math.round((entry[1]/completed.length)*100):0;
    catCard.appendChild(div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0',borderBottom:'0.5px solid var(--border)'}},[
      span({style:{minWidth:'90px',fontSize:'13px'}},entry[0]),
      div({style:{flex:'1',height:'7px',background:'var(--surface)',borderRadius:'4px',overflow:'hidden'}},[div({style:{width:pct+'%',height:'100%',background:'var(--tufts)',borderRadius:'4px'}})]),
      span({style:{minWidth:'60px',textAlign:'right',fontSize:'12px',color:'var(--muted)'}},entry[1]+' ('+pct+'%)'),
    ]));
  });}

  // Top days
  var topCard=div({className:'card',style:{marginBottom:'1.25rem'}});
  topCard.appendChild(div({className:'hdr',style:{fontSize:'15px',marginBottom:'12px'}},'Top 5 most productive days'));
  if(!topDays.length){topCard.appendChild(div({style:{fontSize:'13px',color:'var(--muted)'}},'No data yet.'));}
  else{topDays.forEach(function(entry,ii){
    topCard.appendChild(div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'7px 0',borderBottom:'0.5px solid var(--border)'}},[
      span({style:{fontSize:'12px',color:'var(--muted)',minWidth:'20px'}},(ii+1)+'.'),
      span({style:{flex:'1',fontSize:'13px'}},fmtDate(entry[0])+(entry[0]===today?' (Today)':'')),
      span({style:{fontSize:'13px',fontWeight:'600',color:'var(--ok)'}},entry[1]+' done'),
    ]));
  });}

  // Insights
  var insCard=div({className:'card',style:{marginBottom:'1.25rem'}});
  insCard.appendChild(div({className:'hdr',style:{fontSize:'15px',marginBottom:'12px'}},'Insights & recommendations'));
  insights.forEach(function(ins){
    insCard.appendChild(div({style:{display:'flex',alignItems:'flex-start',gap:'10px',padding:'7px 0',borderBottom:'0.5px solid var(--border)'}},[
      span({className:'badge',style:{background:insBg[ins.c],color:insColors[ins.c],flexShrink:'0',marginTop:'2px'}},ins.c==='ok'?'Good':ins.c==='warn'?'Note':ins.c==='danger'?'Alert':'Info'),
      span({style:{fontSize:'13px',color:'var(--muted)'}},ins.t),
    ]));
  });

  return div({},[rangeRow,verdictCard,metricsGrid,bcCard,trendCard,catCard,topCard,insCard]);
}

// ── RENDER ───────────────────────────────────────────────
function render(){
  var today=todayStr();
  var body=document.body;
  body.setAttribute(state.dark?'data-dark':'data-light','');
  body.removeAttribute(state.dark?'data-light':'data-dark');
  body.style.background='var(--bg)';body.style.color='var(--text)';

  var cl=classify();
  var overdue=cl.overdue,todayT=cl.todayT,skipped=cl.skipped;
  var ot=state.tasks.filter(function(t){return!t.coverage||t.coverage==='none';});
  var otDone=ot.filter(function(t){return t.done;}).length,otTotal=ot.length,otPct=otTotal?Math.round(otDone/otTotal*100):0;
  var recurTasks=state.tasks.filter(function(t){return t.coverage&&t.coverage!=='none';});
  var recurActiveToday=recurTasks.filter(function(t){return isCoveredOn(t,today)&&!isSkipped(t,today);});
  var recurFullDone=recurActiveToday.filter(function(t){return isFullyDone(t,today);}).length;
  var recurPartial=recurActiveToday.filter(function(t){var c=getTickCount(t,today);return c>0&&c<(t.freqTimes||1);}).length;
  var rPct=recurActiveToday.length?Math.round(recurFullDone/recurActiveToday.length*100):0;

  function progBar(pct,color,a,b,extra,label){
    return div({},[
      div({style:{fontSize:'12px',color:'var(--muted)',marginBottom:'6px'}},label),
      div({style:{display:'flex',alignItems:'center',gap:'8px'}},[
        div({className:'prog-bar-wrap'},[div({className:'prog-bar',style:{width:pct+'%',background:color}})]),
        span({style:{fontFamily:"'Cardo',serif",fontSize:'14px',fontWeight:'700',color:'var(--navy)',minWidth:'36px'}},pct+'%'),
      ]),
      div({style:{fontSize:'11px',color:'var(--muted)',marginTop:'4px'}},a+' of '+b+' done'+(extra?' · '+extra+' partial':'')),
    ]);
  }

  var header=div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem',flexWrap:'wrap',gap:'8px'}},[
    div({},[
      div({className:'hdr',style:{fontSize:'24px'}},'OIC Task Manager'),
      div({style:{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}},new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})),
    ]),
    div({style:{display:'flex',gap:'8px',alignItems:'center'}},[
      mkBtn('btn-ghost',state.dark?'☀️ Light':'🌙 Dark',function(){store.set('oic_dark',!state.dark);setState({dark:!state.dark});}),
      mkBtn('btn-primary','+ New Task',function(){setState({showForm:true,editId:null,tab:'tasks',form:blankTask(state.settings)});}),
    ]),
  ]);

  var tabs=div({style:{display:'flex',gap:'8px',marginBottom:'1.25rem',flexWrap:'wrap'}},
    TABS.map(function(pair){
      var b=el('button',{className:'tab-btn '+(state.tab===pair[0]?'tab-active':'tab-inactive')},pair[1]);
      b.addEventListener('click',function(){setState({tab:pair[0]});});
      return b;
    })
  );

  var content=div({});

  if(state.tab==='dashboard'){
    var metrics=div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:'10px',marginBottom:'1.25rem'}},
      [['Total',state.tasks.length,'var(--navy)'],['One-time',otDone,'var(--ok)'],
       ['Overdue',overdue.length,'var(--danger)'],['Today Pending',recurActiveToday.length-recurFullDone,'var(--orange)'],
       ['Recurring',recurTasks.length,'var(--tufts)'],['Skipped',skipped.length,'var(--skip)']].map(function(item){
        return div({className:'metric'},[div({className:'metric-num',style:{color:item[2]}},String(item[1])),div({className:'metric-lbl'},item[0])]);
      })
    );
    var prog=div({className:'card',style:{marginBottom:'1.25rem'}},[
      div({className:'grid2'},[
        progBar(otPct,'#F08530',otDone,otTotal,0,'One-time tasks'),
        progBar(rPct,'var(--tufts)',recurFullDone,recurActiveToday.length,recurPartial,'Recurring — today'),
      ]),
    ]);
    var secs=[];
    if(overdue.length) secs.push(makeSection('🔴 Overdue',overdue,{showDays:true,color:'var(--danger)'}));
    if(todayT.length) secs.push(makeSection("🟡 Today's One-time",todayT,{color:'var(--orange)'}));
    content=div({},[metrics,prog,makeBarChart()].concat(secs).concat([makeWeekView()]));
  }

  if(state.tab==='checklist'){
    var recurToday=getRecurringForDate(today);
    var secs2=[
      makeSection('🔴 Overdue',overdue,{showDays:true,color:'var(--danger)',emptyMsg:'None'}),
      makeSection("🟡 Today's Tasks",todayT,{color:'var(--orange)',emptyMsg:'None'}),
      makeSection('🔁 Recurring (Today)',recurToday,{color:'var(--navy)',emptyMsg:'No recurring tasks today.',dateContext:today}),
    ];
    if(skipped.length) secs2.push(div({style:{marginBottom:'1.5rem'}},[
      div({className:'hdr',style:{fontSize:'16px',color:'var(--skip)',marginBottom:'8px'}},'⏭ Skipped Today ('+skipped.length+')'),
      div({},skipped.map(function(t,ii){return div({className:'card',style:{opacity:'0.6',display:'flex',gap:'8px',alignItems:'center'}},[span({style:{fontSize:'12px',color:'var(--muted)'}},ii+1+'.'),span({style:{fontFamily:"'Cardo',serif",fontSize:'14px',color:'var(--muted)'}},t.title),makeBadge('var(--skip)','var(--skip-bg)','var(--skip-bd)','⏭ Skipped')]);})),
    ]));
    content=div({},secs2);
  }

  if(state.tab==='tasks'){
    var parts=[];
    if(state.showForm) parts.push(makeForm());
    else parts.push(mkBtn('btn-navy','+ Add Task',function(){setState({showForm:true,editId:null,form:blankTask(state.settings)});},{marginBottom:'1rem'}));
    if(state.tasks.length){
      var allIds=state.tasks.map(function(t){return t.id;});
      var allSel=allIds.every(function(id){return state.selected.has(id);}),someSel=state.selected.size>0;
      var cb=el('input',{type:'checkbox',checked:allSel,style:{width:'16px',height:'16px',accentColor:'var(--navy)'}});
      cb.indeterminate=someSel&&!allSel;
      cb.addEventListener('change',function(){setState({selected:allSel?new Set():new Set(allIds)});});
      var toolbar=div({style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'1rem',padding:'8px 12px',background:'var(--surface)',borderRadius:'8px',border:'0.5px solid var(--border)'}},[cb,span({style:{fontSize:'13px',color:'var(--muted)',flex:'1'}},someSel?state.selected.size+' selected':'Select tasks to delete')]);
      if(someSel){var dbb=mkBtn('btn-ghost','🗑 Delete selected',function(){if(window.confirm('Delete '+state.selected.size+' task(s)?')){saveTasks(state.tasks.filter(function(t){return!state.selected.has(t.id);}));setState({selected:new Set()});}});dbb.style.color='var(--danger)';dbb.style.border='0.5px solid var(--danger-bd)';toolbar.appendChild(dbb);}
      parts.push(toolbar);
    }
    var active=state.tasks.filter(function(t){return!t.done;});
    if(!active.length) parts.push(div({style:{fontSize:'13px',color:'var(--muted)',padding:'6px 0'}},'No active tasks.'));
    else active.forEach(function(t,ii){
      var row=div({style:{display:'flex',alignItems:'flex-start',gap:'8px'}});
      var cbb=el('input',{type:'checkbox',checked:state.selected.has(t.id),style:{width:'16px',height:'16px',marginTop:'18px',flexShrink:'0',accentColor:'var(--navy)'}});
      cbb.addEventListener('change',function(){var s=new Set(state.selected);s.has(t.id)?s.delete(t.id):s.add(t.id);setState({selected:s});});
      var card=makeTaskCard(t,{num:ii+1});card.style.flex='1';
      row.appendChild(cbb);row.appendChild(card);parts.push(row);
    });
    var done=state.tasks.filter(function(t){return t.done;});
    if(done.length){
      parts.push(div({className:'hdr',style:{fontSize:'15px',color:'var(--muted)',marginTop:'1rem',marginBottom:'8px'}},'✅ Completed'));
      done.forEach(function(t,ii){
        var row=div({style:{display:'flex',alignItems:'center',gap:'8px'}});
        var cbc=el('input',{type:'checkbox',checked:state.selected.has(t.id),style:{width:'16px',height:'16px',flexShrink:'0',accentColor:'var(--navy)'}});
        cbc.addEventListener('change',function(){var s=new Set(state.selected);s.has(t.id)?s.delete(t.id):s.add(t.id);setState({selected:s});});
        var dcard=div({className:'card',style:{opacity:'0.6',display:'flex',gap:'8px',alignItems:'center',flex:'1',marginBottom:'6px'}},[span({style:{fontSize:'12px',color:'var(--muted)'}},ii+1+'.'),span({style:{fontFamily:"'Cardo',serif",fontSize:'14px',textDecoration:'line-through',color:'var(--muted)',flex:'1'}},t.title),span({style:{fontSize:'12px',color:'var(--muted)'}},'Cleared '+t.clearedOn)]);
        var dbt=mkBtn('btn-ghost','🗑',function(){deleteTask(t.id);},{fontSize:'11px',padding:'1px 6px',color:'var(--danger)'});
        dcard.appendChild(dbt);row.appendChild(cbc);row.appendChild(dcard);parts.push(row);
      });
    }
    content=div({},parts);
  }

  if(state.tab==='logs'){
    var lparts=[div({className:'hdr',style:{fontSize:'18px',marginBottom:'12px'}},'Activity Logs')];
    if(!state.logs.length) lparts.push(div({style:{color:'var(--muted)',fontSize:'14px'}},'No logs yet.'));
    else{
      state.logs.forEach(function(l,ii){
        lparts.push(div({className:'card',style:{marginBottom:'8px',display:'flex',alignItems:'flex-start',gap:'12px'}},[
          span({style:{fontSize:'12px',color:'var(--muted)',minWidth:'22px',marginTop:'2px'}},(ii+1)+'.'),
          div({style:{flex:'1'}},[
            div({style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}},[span({style:{fontFamily:"'Cardo',serif",fontWeight:'700',fontSize:'14px',color:'var(--text)'}},l.title),logBadge(l.type)]),
            div({style:{fontSize:'12px',color:'var(--muted)'}},l.category+' · '+fmtDate(l.clearedOn)),
            l.remark?div({style:{fontSize:'12px',color:'var(--tufts)',marginTop:'2px'}},l.remark):null,
          ].filter(Boolean)),
        ]));
      });
      lparts.push(mkBtn('btn-ghost','Clear all logs',function(){store.set('oic_logs8',[]);setState({logs:[]});},{marginTop:'8px',color:'var(--danger)'}));
    }
    content=div({},lparts);
  }

  if(state.tab==='report') content=makeReportTab();
  if(state.tab==='settings') content=makeSettingsTab();

  var app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(div({},[header,tabs,content]));
}

render();
</script>
</body>
</html>
