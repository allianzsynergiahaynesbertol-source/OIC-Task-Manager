<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#160D76"/>
<title>OIC Task Manager</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cardo:wght@400;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Open Sans',system-ui,sans-serif;min-height:100vh;padding:1.25rem;font-size:14px;}
button,input,select{font-family:inherit;font-size:13px;outline:none;}
.card{border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px;border:0.5px solid var(--border);background:var(--card);}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;}
.hdr{font-family:'Cardo',Georgia,serif;font-weight:700;color:var(--navy);}
.inp{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);width:100%;}
.btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:500;border:none;font-family:inherit;font-size:13px;}
.btn-primary{background:#F08530;color:#fff;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-skip{background:#4a1d96;color:#fff;}
.btn-ghost{background:transparent;border:0.5px solid var(--border)!important;color:var(--muted);}
.tab-btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;}
.tab-active{background:var(--navy);color:#fff;border:none;font-weight:600;}
.tab-inactive{background:transparent;border:0.5px solid var(--border);color:var(--muted);font-weight:400;}
.sec-title{font-family:'Cardo',Georgia,serif;font-weight:700;font-size:16px;}
.prog-wrap{flex:1;height:9px;border-radius:6px;overflow:hidden;border:0.5px solid var(--border);background:var(--surface);}
.prog-bar{height:100%;border-radius:6px;transition:width .4s;}
input[type=checkbox]{cursor:pointer;accent-color:var(--navy);}
.expand-content{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.action-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.cnt-badge{font-size:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:1px 8px;color:var(--muted);}
.week-day{border-radius:8px;padding:6px 4px;text-align:center;border:0.5px solid var(--border);}
.week-day.today{border-color:var(--orange);}
.week-day.clickable{cursor:pointer;}
.week-day.clickable:hover{background:var(--surface);border-color:var(--tufts);}
.week-day.clickable *{cursor:pointer;user-select:none;}
.week-day.expanded{border-color:var(--tufts);background:var(--surface);}
.setting-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:0.5px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.freq-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);display:inline-block;}
.freq-dot.done{background:var(--ok);border-color:var(--ok-bd);}
@keyframes fadeIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn .2s ease forwards;}
@keyframes fadeOut{from{opacity:1;max-height:200px;}to{opacity:0;max-height:0;overflow:hidden;}}
.fade-out{animation:fadeOut .3s ease forwards;}
[data-light]{--navy:#160D76;--tufts:#4094D9;--orange:#F08530;--bg:#FFFFFA;--surface:#f0f0ec;--card:#fff;--border:#d4d4d0;--muted:#666;--text:#222;--danger:#b91c1c;--danger-bg:#fee2e2;--danger-bd:#fca5a5;--warn:#92400e;--warn-bg:#fef3c7;--warn-bd:#fcd34d;--info:#1e40af;--info-bg:#dbeafe;--info-bd:#93c5fd;--ok:#14532d;--ok-bg:#dcfce7;--ok-bd:#86efac;--skip:#4a1d96;--skip-bg:#ede9fe;--skip-bd:#c4b5fd;}
[data-dark]{--navy:#4094D9;--tufts:#60aee8;--orange:#F08530;--bg:#181818;--surface:#242424;--card:#2a2a2a;--border:#3a3a3a;--muted:#aaa;--text:#e8e8e4;--danger:#fca5a5;--danger-bg:#450a0a;--danger-bd:#7f1d1d;--warn:#fcd34d;--warn-bg:#451a03;--warn-bd:#92400e;--info:#93c5fd;--info-bg:#1e3a5f;--info-bd:#1e40af;--ok:#86efac;--ok-bg:#052e16;--ok-bd:#14532d;--skip:#c4b5fd;--skip-bg:#2e1065;--skip-bd:#4a1d96;}
</style>
</head>
<body data-light>
<div id="app"></div>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});

/* ── Storage ─────────────────────────────────────────── */
var S={
  get:function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

/* ── Date helpers ────────────────────────────────────── */
function today(){return new Date().toISOString().split('T')[0];}
function addDays(s,n){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function dow(s){return new Date(s+'T00:00:00').getDay();}
function fmt(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});}
function fmtS(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-PH',{month:'short',day:'numeric'});}
function diffDays(d){return Math.floor((new Date(today())-new Date(d))/86400000);}
function weekMon(s){var d=dow(s);return addDays(s,d===0?-6:1-d);}
function getWeeks(){var t=today(),w=[{mon:weekMon(t),sun:addDays(weekMon(t),6)}];if(dow(t)===0)w.push({mon:weekMon(addDays(t,1)),sun:addDays(weekMon(addDays(t,1)),6)});return w;}
function last14(){var d=[];for(var i=13;i>=0;i--){var x=new Date();x.setDate(x.getDate()-i);d.push(x.toISOString().split('T')[0]);}return d;}

/* ── Constants ───────────────────────────────────────── */
var COV=[{v:'daily',l:'Every Day'},{v:'weekdays',l:'Mon – Fri'},{v:'weekends',l:'Sat – Sun'},{v:'weekly',l:'Weekly (fixed day)'},{v:'monthly',l:'Monthly (fixed date)'},{v:'3rdweek',l:'Every 3rd Week'},{v:'none',l:'One-time'}];
var PERIODS=[{v:'day',l:'per Day'},{v:'week',l:'per Week'},{v:'month',l:'per Month'}];
var PRIOS=['High','Medium','Low'];
var CATS=['Work','Personal','Health','Finance','Operations','Other'];
var DOW_L=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ── Period key ──────────────────────────────────────── */
function periodKey(period,d){
  if(period==='day') return d;
  if(period==='week') return 'w-'+weekMon(d);
  return 'm-'+d.slice(0,7);
}
function tickCount(task,d){
  var keys=Object.keys(task.ticks||{});
  var myKey=periodKey(task.freqPeriod||'day',d);
  // check today's key first, then any key that matches same period
  var tdays=(task.ticks||{})[myKey]||[];
  if(tdays.length) return tdays.length;
  // fallback: check all keys for same period bucket
  for(var i=0;i<keys.length;i++){
    if(periodKey(task.freqPeriod||'day',keys[i])===myKey){
      return((task.ticks||{})[keys[i]]||[]).length;
    }
  }
  return 0;
}
function isDone(task,d){
  if(task.coverage==='none'||!task.coverage) return !!task.done;
  return tickCount(task,d)>=(task.freqTimes||1);
}
function coveredOn(task,d){
  var c=task.coverage||'none';
  if(c==='none') return false;
  var dw=dow(d);
  if(c==='daily') return true;
  if(c==='weekdays') return dw>=1&&dw<=5;
  if(c==='weekends') return dw===0||dw===6;
  if(c==='weekly'){return dw===(task.due?dow(task.due):1);}
  if(c==='monthly'){var td=task.due?new Date(task.due+'T00:00:00').getDate():1;return new Date(d+'T00:00:00').getDate()===td;}
  if(c==='3rdweek'){var dd=new Date(d+'T00:00:00').getDate();return dd>=15&&dd<=21;}
  return false;
}
function isSkipped(task,d){
  return (task.skips||[]).some(function(r){return d>=r.from&&d<=r.to;});
}
function activeToday(task){return coveredOn(task,today())&&!isSkipped(task,today())&&!isDone(task,today());}

/* ── Default settings ────────────────────────────────── */
function defSettings(){return{coverage:'weekdays',freqTimes:1,freqPeriod:'day',priority:'Medium',category:'Work',name:'',position:''};}
function blankTask(cfg){var c=cfg||{};return{title:'',priority:c.priority||'Medium',due:today(),category:c.category||'Work',coverage:c.coverage||'weekdays',freqTimes:c.freqTimes||1,freqPeriod:c.freqPeriod||'day',note:''};}

/* ── State ───────────────────────────────────────────── */
var CFG=S.get('oic_cfg')||defSettings();
var APP={
  dark:S.get('oic_dark')||false,
  tasks:S.get('oic_tasks9')||[],
  logs:S.get('oic_logs9')||[],
  tab:'dashboard',
  form:blankTask(CFG),
  showForm:false,editId:null,
  expanded:{},weekExp:{},
  rmkId:null,rmkTxt:'',
  rsId:null,rsDue:'',
  skipId:null,skipFrom:'',skipTo:'',
  ecId:null,
  sel:[],
  reportRange:30,
  cfg:CFG
};

function set(patch,noRender){Object.assign(APP,patch);if(!noRender)render();}
function save(tasks,logs){
  S.set('oic_tasks9',tasks);
  if(logs!==undefined) S.set('oic_logs9',logs);
  set({tasks:tasks,logs:logs!==undefined?logs:APP.logs});
}

/* ── Selection helpers (plain array, NO Set) ─────────── */
function selHas(id){return APP.sel.indexOf(id)>=0;}
function selToggle(id){var a=APP.sel.slice();var i=a.indexOf(id);if(i>=0)a.splice(i,1);else a.push(id);set({sel:a});}
function selAll(){set({sel:APP.tasks.map(function(t){return t.id;})});}
function selNone(){set({sel:[]});}

/* ── Task actions ────────────────────────────────────── */
function tick(id,dateCtx){
  var t=APP.tasks.find(function(x){return x.id===id;});
  if(!t) return;
  var d=dateCtx||today();
  var isRecur=t.coverage&&t.coverage!=='none';

  function animate(fn){
    var el=document.querySelector('[data-tid="'+id+'"]');
    if(el){el.classList.add('fade-out');setTimeout(fn,300);}else fn();
  }

  if(isRecur){
    var key=periodKey(t.freqPeriod||'day',today());
    var ticks=Object.assign({},t.ticks||{});
    var existing=ticks[key]||[];
    var max=t.freqTimes||1;
    if(existing.length>=max){
      // untick — remove period
      delete ticks[key];
      save(APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{ticks:ticks,clearedOn:''}):x;}),
        APP.logs.filter(function(l){return!(l.sid===id&&l.pkey===key);}));
    }else{
      ticks[key]=existing.concat([today()]);
      var n=existing.length+1;
      var done=n>=max;
      var newLog={id:Date.now(),sid:id,title:t.title,cat:t.category,on:today(),pkey:key,note:'Tick '+n+'/'+max+(done?' — done':''),type:done?'completed':'partial'};
      var updated=APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{ticks:ticks,clearedOn:done?today():x.clearedOn}):x;});
      if(done) animate(function(){save(updated,[newLog].concat(APP.logs));});
      else save(updated,[newLog].concat(APP.logs));
    }
  }else{
    if(t.done){
      save(APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{done:false,clearedOn:''}):x;}),
        APP.logs.filter(function(l){return!(l.sid===id&&l.type==='completed');}));
    }else{
      var u=APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{done:true,clearedOn:today()}):x;});
      var lg={id:Date.now(),sid:id,title:t.title,cat:t.category,on:today(),note:t.remark||'',type:'completed'};
      animate(function(){save(u,[lg].concat(APP.logs));});
    }
  }
}
function delTask(id){save(APP.tasks.filter(function(t){return t.id!==id;}));}
function submitForm(){
  var f=APP.form;if(!f.title.trim())return;
  var tasks=APP.editId
    ?APP.tasks.map(function(t){return t.id===APP.editId?Object.assign({},t,f):t;})
    :APP.tasks.concat([Object.assign({},f,{id:Date.now(),done:false,clearedOn:'',ticks:{},skips:[],remark:''})]);
  save(tasks);
  set({showForm:false,editId:null,form:blankTask(APP.cfg)});
}
function saveRmk(id){save(APP.tasks.map(function(t){return t.id===id?Object.assign({},t,{remark:APP.rmkTxt}):t;}));set({rmkId:null,rmkTxt:''});}
function saveRs(id){
  if(!APP.rsDue)return;
  var t=APP.tasks.find(function(x){return x.id===id;});
  save(APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{due:APP.rsDue,done:false}):x;}),
    [{id:Date.now(),sid:id,title:t.title,cat:t.category,on:today(),note:'Rescheduled → '+fmt(APP.rsDue),type:'rescheduled'}].concat(APP.logs));
  set({rsId:null,rsDue:''});
}
function saveSkip(id){
  var from=APP.skipFrom||today(),to=APP.skipTo||from;
  if(from>to){alert("'From' must be ≤ 'To'.");return;}
  var t=APP.tasks.find(function(x){return x.id===id;});
  var label=from===to?fmt(from):fmt(from)+' – '+fmt(to);
  save(APP.tasks.map(function(x){return x.id===id?Object.assign({},x,{skips:(x.skips||[]).concat([{from:from,to:to,id:Date.now()}])}):x;}),
    [{id:Date.now(),sid:id,title:t.title,cat:t.category,on:today(),note:'Skipped: '+label,type:'skipped'}].concat(APP.logs));
  set({skipId:null,skipFrom:'',skipTo:''});
}
function removeSkip(tid,sid){save(APP.tasks.map(function(t){return t.id===tid?Object.assign({},t,{skips:(t.skips||[]).filter(function(s){return s.id!==sid;})}):t;}));}

/* ── Classify ────────────────────────────────────────── */
function classify(){
  var t=today();
  var ov=[],tod=[],up=[],sk=[];
  APP.tasks.forEach(function(task){
    var rec=task.coverage&&task.coverage!=='none';
    if(rec){
      if((task.coverage==='weekly'||task.coverage==='monthly'||task.coverage==='3rdweek')&&task.due&&task.due<t){
        if(!isDone(task,task.due)&&!isSkipped(task,task.due)) ov.push(task);
      }
      return;
    }
    if(task.done) return;
    if(isSkipped(task,t)){sk.push(task);return;}
    if(task.due<t) ov.push(task);
    else if(task.due===t) tod.push(task);
    else up.push(task);
  });
  return{ov:ov,tod:tod,up:up,sk:sk};
}
function recurForDay(d){
  return APP.tasks.filter(function(t){
    if(!t.coverage||t.coverage==='none') return false;
    if(isSkipped(t,d)) return false;
    if(!coveredOn(t,d)) return false;
    if(isDone(t,d)) return false;
    return true;
  });
}
function recurDoneForDay(d){
  return APP.tasks.filter(function(t){
    if(!t.coverage||t.coverage==='none') return false;
    if(!coveredOn(t,d)) return false;
    return isDone(t,d);
  });
}

/* ── DOM helpers ─────────────────────────────────────── */
function el(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k==='className') e.className=v;
    else if(k==='checked'||k==='disabled') e[k]=v;
    else if(k==='value') e.value=v;
    else if(k.indexOf('on')===0) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(v!==null&&v!==undefined&&v!==false) e.setAttribute(k,v===true?'':String(v));
  });
  if(kids)(Array.isArray(kids)?kids:[kids]).forEach(function(c){
    if(c===null||c===undefined||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function d(a,c){return el('div',a,c);}
function sp(a,c){return el('span',a,c);}
function btn(cls,txt,fn,sty){var b=el('button',{className:'btn '+cls,style:sty||{}},txt);b.addEventListener('click',fn);return b;}
function inp(type,val,fn,attrs){
  var i=el('input',Object.assign({type:type,value:val||''},attrs||{}));
  if(type==='text'){
    i.addEventListener('input',function(e){fn(e.target.value,true);});
    i.addEventListener('change',function(e){fn(e.target.value,false);});
  }else i.addEventListener('change',function(e){fn(e.target.value);});
  return i;
}
function sel(opts,val,fn,attrs){
  var s=el('select',Object.assign({className:'inp'},attrs||{}));
  opts.forEach(function(o){var op=el('option',{value:o[0]},o[1]);if(o[0]===val||String(o[0])===String(val))op.selected=true;s.appendChild(op);});
  s.addEventListener('change',function(e){fn(e.target.value);});
  return s;
}

/* ── Badges ──────────────────────────────────────────── */
function badge(col,bg,bd,txt){return sp({className:'badge',style:{color:col,background:bg,border:'0.5px solid '+bd}},txt);}
function priBadge(p){
  if(p==='High') return badge('var(--danger)','var(--danger-bg)','var(--danger-bd)',p);
  if(p==='Medium') return badge('var(--warn)','var(--warn-bg)','var(--warn-bd)',p);
  return badge('var(--ok)','var(--ok-bg)','var(--ok-bd)',p);
}
function logBadge(type){
  if(type==='skipped') return badge('var(--skip)','var(--skip-bg)','var(--skip-bd)','⏭ Skipped');
  if(type==='rescheduled') return badge('var(--info)','var(--info-bg)','var(--info-bd)','📅 Rescheduled');
  if(type==='partial') return badge('var(--warn)','var(--warn-bg)','var(--warn-bd)','◑ Partial');
  return badge('var(--ok)','var(--ok-bg)','var(--ok-bd)','✓ Completed');
}
function covLabel(c){var o=COV.find(function(x){return x.v===c;});return o?o.l:c;}
function freqStr(t){var tl=t.freqTimes===1?'Once':t.freqTimes===2?'Twice':(t.freqTimes||1)+'×';var pl=(t.freqPeriod||'day')==='day'?'day':(t.freqPeriod==='week'?'wk':'mo');return covLabel(t.coverage)+' · '+tl+'/'+pl;}

/* ── Task card ───────────────────────────────────────── */
function taskCard(t,opts){
  opts=opts||{};
  var td=today();
  var dc=opts.dateCtx||td;
  var rec=t.coverage&&t.coverage!=='none';
  var max=t.freqTimes||1;
  var ticks=rec?tickCount(t,dc):0;
  var full=rec?isDone(t,dc):t.done;
  var exp=APP.expanded[t.id];
  var askips=(t.skips||[]).filter(function(s){return s.to>=td;});

  /* circle */
  var circ=el('button',{style:{marginTop:'3px',width:'22px',height:'22px',borderRadius:'50%',flexShrink:0,cursor:'pointer',
    border:'2px solid '+(full?'var(--ok)':ticks>0?'var(--orange)':'var(--tufts)'),
    background:full?'var(--ok)':ticks>0?'rgba(240,133,48,.15)':'transparent',
    display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:'700',
    color:full?'#fff':ticks>0?'var(--orange)':'var(--tufts)'}},
    rec&&max>1?(full?'✓':ticks>0?ticks+'/'+max:'+'):(full?'✓':'+'));
  (function(tid,dctx){circ.addEventListener('click',function(){tick(tid,dctx);});})(t.id,dc);

  var badges=[priBadge(t.priority),badge('var(--info)','var(--info-bg)','var(--info-bd)',t.category)];
  if(rec) badges.push(badge('var(--navy)','var(--surface)','var(--border)',freqStr(t)));
  if(opts.showDays&&diffDays(t.due)>0) badges.push(badge('var(--danger)','var(--danger-bg)','var(--danger-bd)',diffDays(t.due)+'d overdue'));
  if(full) badges.push(badge('var(--ok)','var(--ok-bg)','var(--ok-bd)',rec?'✓ Done':'✓ Done'));
  else if(rec&&ticks>0) badges.push(badge('var(--warn)','var(--warn-bg)','var(--warn-bd)',ticks+' of '+max));
  if(askips.length) badges.push(badge('var(--skip)','var(--skip-bg)','var(--skip-bd)','⏭ '+askips.length+' skip'+(askips.length>1?'s':'')));

  var titleRow=d({style:{display:'flex',flexWrap:'wrap',alignItems:'center',gap:'6px',marginBottom:'4px'}},
    [sp({style:{fontFamily:"'Cardo',Georgia,serif",fontWeight:'700',fontSize:'15px',color:'var(--text)',
      textDecoration:full?'line-through':'none',opacity:full?0.5:1}},t.title)].concat(badges));

  var meta=[];
  if(rec&&max>1){
    var dots=d({style:{display:'flex',gap:'3px',marginTop:'4px',alignItems:'center'}});
    for(var qi=0;qi<max;qi++) dots.appendChild(el('span',{className:'freq-dot'+(qi<ticks?' done':'')}));
    meta.push(d({style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'4px'}},[sp({style:{fontSize:'11px',color:'var(--muted)'}},'Progress:'),dots,sp({style:{fontSize:'11px',color:full?'var(--ok)':'var(--muted)'}},ticks+'/'+max)]));
  }
  if(!rec) meta.push(d({style:{fontSize:'12px',color:'var(--muted)'}},'Due: '+fmt(t.due)));

  /* closed date */
  if(full&&t.clearedOn){
    var cr=d({style:{display:'flex',alignItems:'center',gap:'6px',marginTop:'3px'}});
    if(APP.ecId===t.id){
      var ci=inp('date',t.clearedOn,function(v){
        var ut=APP.tasks.map(function(x){return x.id===t.id?Object.assign({},x,{clearedOn:v}):x;});
        var ul=APP.logs.map(function(l){return l.sid===t.id&&l.type==='completed'?Object.assign({},l,{on:v}):l;});
        S.set('oic_tasks9',ut);S.set('oic_logs9',ul);set({tasks:ut,logs:ul,ecId:null});
      },{className:'inp',style:{width:'140px',fontSize:'11px',padding:'2px 6px'}});
      cr.appendChild(sp({style:{fontSize:'11px',color:'var(--muted)'}},'Cleared: '));
      cr.appendChild(ci);

/* ── Week view ───────────────────────────────────────── */
function weekView(){
  var td=today();
  var weeks=getWeeks();
  if(!APP.weekExp) APP.weekExp={};
  var wrap=d({});

  weeks.forEach(function(week,wi){
    var mon=week.mon,sun=week.sun;
    var label=(wi===0?'This Week':'Next Week')+' ('+fmtS(mon)+' – '+fmtS(sun)+')';
    var wTot=0,wDone=0;
    var dayData=[];

    for(var i=0;i<7;i++){
      (function(i){
        var ds=addDays(mon,i);
        var dw=dow(ds);
        var isToday=ds===td;
        var isPast=ds<td;
        var oneT=APP.tasks.filter(function(t){return(!t.coverage||t.coverage==='none')&&!t.done&&t.due===ds;});
        var rec=recurForDay(ds);
        var recD=recurDoneForDay(ds);
        var oneD=APP.tasks.filter(function(t){return(!t.coverage||t.coverage==='none')&&t.done&&t.clearedOn===ds;});
        var allAct=oneT.concat(rec);
        var tot=allAct.length+recD.length+oneD.length;
        var dne=recD.length+oneD.length;
        wTot+=tot;wDone+=dne;
        var pri={H:0,M:0,L:0},priD={H:0,M:0,L:0};
        allAct.concat(recD).concat(oneD).forEach(function(t){
          var k=t.priority==='High'?'H':t.priority==='Low'?'L':'M';
          pri[k]++;if(isDone(t,ds))priD[k]++;
        });
        dayData.push({ds:ds,dw:dw,isToday:isToday,isPast:isPast,allAct:allAct,recD:recD,oneD:oneD,tot:tot,dne:dne,allDone:tot>0&&dne===tot,pri:pri,priD:priD});
      })(i);
    }

    var wAllDone=wTot>0&&wDone===wTot;
    var card=d({className:'card',style:{marginBottom:'1.25rem',borderLeft:'3px solid var(--tufts)'}});
    var hrow=d({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}});
    hrow.appendChild(d({className:'hdr',style:{fontSize:'15px'}},label));
    if(wTot>0) hrow.appendChild(sp({style:{fontSize:'13px',fontWeight:'700',color:wAllDone?'var(--ok)':'var(--orange)'}},wDone+'/'+wTot));
    card.appendChild(hrow);

    /* day rows */
    dayData.forEach(function(dd){
      var isExp=!!(APP.weekExp[dd.ds]);
      /* day summary row */
      var drow=d({style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:'0.5px solid var(--border)',cursor:dd.tot>0?'pointer':'default',userSelect:'none'}});

      /* day pill */
      var pill=d({style:{minWidth:'60px',background:'var(--surface)',border:'0.5px solid '+(dd.isToday?'var(--orange)':'var(--border)'),borderRadius:'8px',padding:'4px 6px',textAlign:'center',flexShrink:0}});
      var dn=document.createElement('div');dn.style.cssText='font-weight:600;font-size:10px;color:'+(dd.isToday?'var(--orange)':'var(--muted)')+';';dn.textContent=DOW_L[dd.dw];
      var dnum=document.createElement('div');dnum.style.cssText="font-family:'Cardo',Georgia,serif;font-weight:700;font-size:18px;color:"+(dd.isToday?'var(--orange)':'var(--text)')+';';dnum.textContent=new Date(dd.ds+'T00:00:00').getDate();
      pill.appendChild(dn);pill.appendChild(dnum);
      drow.appendChild(pill);

      /* info */
      var info=d({style:{flex:1}});
      var cnt=document.createElement('div');
      cnt.style.cssText='font-size:12px;font-weight:600;margin-bottom:3px;color:'+(dd.tot===0?'var(--muted)':dd.allDone?'var(--ok)':dd.isPast&&dd.dne<dd.tot?'var(--danger)':'var(--muted)')+';';
      cnt.textContent=dd.tot===0?'No tasks':dd.allDone?'✓ All done ('+dd.dne+'/'+dd.tot+')':dd.dne+'/'+dd.tot+' done';
      info.appendChild(cnt);
      var pr=document.createElement('div');pr.style.cssText='display:flex;gap:6px;';
      ['H','M','L'].forEach(function(k){var c=dd.pri[k],dn2=dd.priD[k];var p=document.createElement('span');p.style.cssText='font-size:10px;font-weight:600;opacity:'+(c===0?'0.25':'1')+';color:'+(c===0?'var(--muted)':dn2===c?'var(--ok)':'var(--orange)')+';';p.textContent=k+(c>0?' '+dn2+'/'+c:'');pr.appendChild(p);});
      info.appendChild(pr);
      drow.appendChild(info);

      if(dd.tot>0){
        var expBtn2=btn('btn-ghost',isExp?'▲':'▼',function(){},{fontSize:'11px',padding:'2px 8px'});
        (function(ds,eb){
          function toggle(){var we=Object.assign({},APP.weekExp||{});we[ds]=!we[ds];set({weekExp:we});}
          eb.addEventListener('click',function(e){e.stopPropagation();toggle();});
          drow.addEventListener('click',toggle);
        })(dd.ds,expBtn2);
        drow.appendChild(expBtn2);
      }
      card.appendChild(drow);

      /* dropdown */
      if(isExp&&dd.tot>0){
        var drop=d({style:{padding:'8px 0 4px 8px',borderBottom:'0.5px solid var(--border)'}});
        dd.allAct.forEach(function(t,i){drop.appendChild(taskCard(t,{num:i+1,dateCtx:dd.ds}));});
        dd.recD.concat(dd.oneD).forEach(function(t,i){
          var c=taskCard(t,{num:dd.allAct.length+i+1,dateCtx:dd.ds});
          c.style.opacity='0.4';drop.appendChild(c);
        });
        card.appendChild(drop);
      }
    });
    wrap.appendChild(card);
  });
  return wrap;
}

/* ── Bar chart ───────────────────────────────────────── */
function barChart(){
  var td=today(),days=last14();
  var data=days.map(function(ds){
    return{ds:ds,
      c:APP.logs.filter(function(l){return l.on===ds&&l.type==='completed';}).length,
      p:APP.logs.filter(function(l){return l.on===ds&&l.type==='partial';}).length,
      s:APP.logs.filter(function(l){return l.on===ds&&l.type==='skipped';}).length,
      tot:APP.logs.filter(function(l){return l.on===ds;}).length};
  });
  var mx=Math.max.apply(null,data.map(function(x){return x.tot;}).concat([1]));
  var bW=34,gap=6,cH=140,lH=40,tW=(bW+gap)*days.length;
  var dark=APP.dark;
  var C={bd:dark?'#3a3a3a':'#d4d4d0',mu:dark?'#aaa':'#666',nv:dark?'#4094D9':'#160D76',sf:dark?'#242424':'#f0f0ec',tu:dark?'#60aee8':'#4094D9',sk:dark?'#c4b5fd':'#4a1d96'};

  [0,.25,.5,.75,1].forEach(function(r){var ln=document.createElementNS('http://www.w3.org/2000/svg','line');var y=Math.round(cH*(1-r));['x1','y1','x2','y2','stroke','stroke-width'].forEach(function(a,i){ln.setAttribute(a,[0,y,tW,y,C.bd,'0.5'][i]);});svg.appendChild(ln);});
  data.forEach(function(x,i){
    var px=i*(bW+gap);
    var cHh=x.tot?Math.round((x.c/mx)*cH):0,pH=x.tot?Math.round((x.p/mx)*cH):0,sH=x.tot?Math.round((x.s/mx)*cH):0;
    var isT=x.ds===td;
    function rect(y,h,fill){if(h<=0)return;var r=document.createElementNS('http://www.w3.org/2000/svg','rect');r.setAttribute('x',px);r.setAttribute('y',y);r.setAttribute('width',bW);r.setAttribute('height',h);r.setAttribute('fill',fill);r.setAttribute('rx',2);svg.appendChild(r);}
    function txt(y,text,col,wt){var t=document.createElementNS('http://www.w3.org/2000/svg','text');t.setAttribute('x',px+bW/2);t.setAttribute('y',y);t.setAttribute('text-anchor','middle');t.setAttribute('font-size',9);t.setAttribute('fill',col);t.setAttribute('font-weight',wt||'400');t.textContent=text;svg.appendChild(t);}
    rect(cH-sH,sH,C.sk);rect(cH-sH-pH,pH,'#F08530');rect(cH-sH-pH-cHh,cHh,C.tu);
    if(!x.tot)rect(cH-3,3,C.sf);
    if(x.tot>0)txt(cH-sH-pH-cHh-4,x.tot,C.mu);
    var pts=fmtS(x.ds).split(' ');
    txt(cH+14,pts[0],isT?C.nv:C.mu,isT?'600':'400');
    txt(cH+26,pts[1]||'',isT?C.nv:C.mu,isT?'600':'400');

  });
  return d({className:'card',style:{marginBottom:'1.25rem'}},[
    d({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',flexWrap:'wrap',gap:'8px'}},[
      sp({className:'hdr',style:{fontSize:'15px'}},'Daily Activity (Last 14 Days)'),
      d({style:{display:'flex',gap:'10px',fontSize:'11px',color:'var(--muted)'}},['Completed|'+C.tu,'Partial|#F08530','Skipped|'+C.sk].map(function(s){var pts=s.split('|');var dot=el('span',{style:{display:'inline-block',width:'10px',height:'10px',borderRadius:'2px',background:pts[1],marginRight:'4px'}});return sp({},[dot,pts[0]]);})),
    ]),
    d({style:{overflowX:'auto'}},svg),
  ]);

  if(APP.tab==='settings') content=settingsTab();

  var app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(d({},[header,tabs,content]));
}

render();
</script>
